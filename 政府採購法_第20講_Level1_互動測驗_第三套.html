<script>
const questions = [{"id": "GPL20C-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某投標廠商只把材料費列入報價，完全漏列人工、運輸、儲存、檢驗與售後服務。依第20講，主要問題為何？", "option_a": "未採總成本觀，成本構成不完整", "option_b": "只列材料費最合規", "option_c": "售後服務不得列入成本", "option_d": "運輸儲存完全不用估算", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講價格與成本分析強調總成本觀，包含直接材料/人工、間接材料/人工/管銷，以及服務、運輸、儲存、檢驗測試、交期、品質不良率、售後服務等。", "topic": "成本構成", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "某營造工程報價完全未估利潤與管銷，只想低價搶標。依第20講，報價策略較應如何設計？", "option_a": "成本加合理利潤與管銷，建立心中目標價或底價", "option_b": "完全不估成本也可", "option_c": "利潤永遠不得編列", "option_d": "只用最低價壓過別人即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出標價策略應為成本＋合理利潤＋管銷，並建立心中目標價/底價。", "topic": "合理利潤", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "機關審標時只看採購當下價格，完全不看維護、售後、品質不良率與履約風險。依第20講，主要缺失為何？", "option_a": "未重視全生命週期成本 LCC 與履約風險", "option_b": "LCC只適用刑事案件", "option_c": "維護成本永遠不重要", "option_d": "審標只能看單價最低", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出審標時重視全生命週期成本（LCC）與履約風險。", "topic": "全生命週期成本", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "某委員認為最有利標完全不能看價格。依第20講，何者正確？", "option_a": "最有利標仍可評估價格，只是不只看低價", "option_b": "最有利標絕對不得看價格", "option_c": "最有利標只看最低價", "option_d": "價格只能驗收後才看", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出最有利標評審面向包含技術、品質、功能、商業條件與價格。", "topic": "MAT價格面向", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "某大型複雜工程若只用最低價，可能發生履約風險與浪費。依第20講，政策導向為何？", "option_a": "大額、複雜、專業性標的優先採最有利標", "option_b": "大額複雜標的一律不得評選", "option_c": "所有案件只准最低標", "option_d": "最有利標只適用文具", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出大額/複雜/專業性標的優先採最有利標，以避免單一低價造成履約風險與浪費。", "topic": "政策導向", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "某機關未先成立評選委員會與訂評選標準，就已公告最有利標。依第20講，程序問題為何？", "option_a": "招標前應成立評選委員會並訂/審評選標準", "option_b": "評選委員會只能驗收後成立", "option_c": "標準可得標後才訂", "option_d": "不需評選標準", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講核心程序第一步為招標前成立評選委員會，訂/審評選標準。", "topic": "MAT程序順序", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "某最有利標案完全沒有工作小組初審，評選委員直接面對雜亂資料。依第20講，較佳作法為何？", "option_a": "必要時成立工作小組進行文件初審與資格/規格查核", "option_b": "工作小組絕對禁止成立", "option_c": "工作小組只能決定得標廠商", "option_d": "工作小組不用看文件", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出成立工作小組可進行初審，工作小組任務包括文件初審、資格/規格查核、廠商說明會等。", "topic": "工作小組初審", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "協商過程只有電話溝通，沒有書面措施或紀錄。依第20講，主要問題為何？", "option_a": "必要時應採書面措施，並控制協商/議價輪次與留痕", "option_b": "協商不得留任何紀錄", "option_c": "電話協商永遠足夠", "option_d": "協商可無限輪且不用紀錄", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講最有利標程序提到必要時採書面措施（含減價/議價），並控制協商/議價輪次。", "topic": "協商書面化", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "評選出優勝廠商後，機關未就細節協商也未完成合約，就讓廠商先做。依第20講，主要問題為何？", "option_a": "應依第56條與優勝廠商就細節協商，完成合約後履約", "option_b": "評選完即可無約履行", "option_c": "合約可完工後再補", "option_d": "第56條只管押標金", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講核心程序指出，依第56條與優勝廠商就細節協商，完成合約。", "topic": "合約完成", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "公告金額以上採最有利標，機關想完全不公告也不走完整程序。依第20講，何者正確？", "option_a": "公告金額以上適合採不訂底價之最有利標，須公報公告且程序完整", "option_b": "公告金額以上完全不用公告", "option_c": "公告金額以上只能小額逕洽", "option_d": "公告金額以上不得最有利標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出公告金額以上適合採不訂底價之最有利標，公報公告、程序完整。", "topic": "公告金額以上", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-11", "level": "Level 1", "type": "multiple_choice", "question": "未達公告金額案件，機關採公開取得最符合需要者，第一次未滿三家即放棄。依第20講，何者正確？", "option_a": "首次未滿三家得續辦，重視效率與需求符合", "option_b": "首次未滿三家必須永遠停辦", "option_c": "未達公告金額不能公開取得", "option_d": "公開取得一定不得續辦", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出未達公告金額可採公開取得最符合需要者，程序簡化，首次未滿三家得續辦。", "topic": "公開取得最符合需要者", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "某機關辦理聲音、影像、文字、圖像或實物等創意標的評比。依第20講，較接近何種準用範圍？", "option_a": "設計競賽", "option_b": "土石方申報", "option_c": "押標金沒收", "option_d": "不良廠商公告", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講準用範圍例示包含設計競賽，針對聲音、影像、文字、圖像、實物等創意標的。", "topic": "設計競賽", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "依第20講，設計競賽評比重點可包含何者？", "option_a": "完整性、可行性、理念、藝術性、實用性", "option_b": "廠商星座", "option_c": "最低價唯一標準", "option_d": "投標順序先後", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出設計競賽評比完整性、可行性、理念/藝術/實用性。", "topic": "設計競賽評比", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "某人曾有貪污犯罪判決，機關仍遴選為評選委員。依第20講，主要問題為何？", "option_a": "評選委員不得有貪污等犯罪判決等消極資格事由", "option_b": "貪污判決可加分", "option_c": "消極資格完全不用審", "option_d": "委員只看名氣", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講評選委員消極資格包含不得有貪污等犯罪判決、褫奪公權、破產未復權、專業停撤照等。", "topic": "委員消極資格", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "同一類採購長期固定聘同一批委員，且均由特定廠商推薦。依第20講，主要風險為何？", "option_a": "影響公正性；不得接受舉薦並應避免長期重複聘同一人", "option_b": "越固定越合規", "option_c": "廠商推薦最公平", "option_d": "委員不需公正性", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出不得為特定廠商利益遴選，不得接受舉薦，並避免長期重複聘同一人。", "topic": "委員重複聘任", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "評選委員本人同時參與該標投標或分包。依第20講，主要問題為何？", "option_a": "委員不得參與該標投標、分包或擔任工作人員，違者取消決標資格", "option_b": "委員可同時投標", "option_c": "委員可同時分包且不用揭露", "option_d": "委員只能投最低價", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出委員不得參與該標之投標、分包或擔任工作人員，違者取消決標資格。", "topic": "委員投標禁止", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "外聘委員支領出席費、交通費與稿費。依第20講，這是否可能？", "option_a": "可依機關規定支領，出席費常見約2000至2500元/日", "option_b": "外聘委員絕對不得支領費用", "option_c": "外聘委員只能向廠商收費", "option_d": "酬勞由得標廠商決定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出外聘委員得依機關規定支領出席費、交通費與稿費，常見出席費約新臺幣2000–2500元/日。", "topic": "外聘酬勞", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "工作小組成員與投標廠商有利害關係，但未迴避。依第20講，主要問題為何？", "option_a": "工作小組亦應依第14條辦理迴避", "option_b": "只有評選委員需迴避，工作小組不用", "option_c": "有利害關係可提高效率", "option_d": "工作小組不得迴避", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出工作小組至少3人、至少1人具採購專業資格，並依第14條辦理迴避。", "topic": "工作小組迴避", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "得標後機關與廠商私下改變主要規格，未經雙方正式書面簽署。依第20講，效力如何？", "option_a": "非經雙方同意並簽署之書面變更不生效力", "option_b": "私下口頭同意即生效", "option_c": "廠商單方通知即生效", "option_d": "監造口頭同意即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講契約管理指出，非經買賣雙方同意並簽署之書面變更不生效力。", "topic": "契約任意變更", "source": "Notion：政府採購法 / 第20講 / 第三套"}, {"id": "GPL20C-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "機關驗收時只口頭表示合格，沒有依規格標準保存驗收文件與證明。依第20講，主要缺失為何？", "option_a": "驗收應依約定規格/標準辦理，並保留完整驗收文件與證明", "option_b": "驗收不得保存文件", "option_c": "口頭合格永遠足夠", "option_d": "驗收只看照片即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講契約管理與驗收指出，驗收應依約定規格/標準辦理，保留完整驗收文件與證明。", "topic": " 案例常見風險", "source": "Notion：政府採購法 / 第20講 / 第三套"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
