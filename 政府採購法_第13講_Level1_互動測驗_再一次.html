 "explanation": "第13講第63條指出，規劃、設計、監造、管理契約要項應明定廠商因設計錯誤、監造不實、管理不善致機關受損之損害賠償責任。", "topic": "契約要項責任", "source": "Notion：政府採購法 / 第13講 / 再一次"}, {"id": "GPL13B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "都市計畫重大變更後，原工程繼續履約已不符公共利益。機關若要解除契約，依第13講應如何處理？", "option_a": "報請上級機關核准，並補償廠商因此所受損失", "option_b": "承辦人電話通知即可解除且不補償", "option_c": "直接拒絕付款即可", "option_d": "一定不得解除契約", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第13講第64條指出，因政策變更致繼續履約不符公共利益，機關得報請上級機關核准中止或解除契約，並補償廠商損失。", "topic": "政策變更解除", "source": "Notion：政府採購法 / 第13講 / 再一次"}, {"id": "GPL13B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "得標廠商將招標文件標示的主要部分全部交由其他公司履行。依第13講，主要問題為何？", "option_a": "主要部分須由得標廠商自行履行，不得轉包", "option_b": "主要部分最適合轉包", "option_c": "只要價格不變即可轉包", "option_d": "轉包只需告知分包商即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第13講第65條整理，得標廠商應自行履行，特別是主要部分須親自履行，不得轉包他人；主要部分以招標文件標示為準。", "topic": "主要部分轉包", "source": "Notion：政府採購法 / 第13講 / 再一次"}, {"id": "GPL13B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "某招標文件未清楚標示契約主要部分，後續發生轉包/分包爭議。依第13講，文件設計上應注意何者？", "option_a": "招標文件務必清楚標示主要部分", "option_b": "招標文件不得標示主要部分", "option_c": "主要部分由廠商事後自定", "option_d": "主要部分只看廠商營業額", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第13講實務提醒，招標文件務必清楚標示主要部分，並建立分包報備與權利設定流程。", "topic": "主要部分標示", "source": "Notion：政府採購法 / 第13講 / 再一次"}, {"id": "GPL13B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "得標廠商將非主要部分交由專業廠商施作，但完全未向機關報備。依第13講，主要缺失為何？", "option_a": "非主要部分得分包，但須向機關報備", "option_b": "非主要部分不得分包", "option_c": "分包一律等於違法轉包", "option_d": "分包只需通知投標失敗廠商", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第13講第67條整理，非主要部分得分包予其他廠商，但須向機關報備。", "topic": "分包未報備", "source": "Notion：政府採購法 / 第13講 / 再一次"}, {"id": "GPL13B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "某工程將鋼筋、模板等專業項目分包，且金額達一定比率。依第13講，除了報備外，還可能需如何處理？", "option_a": "應送主管機關備查", "option_b": "必須秘密分包", "option_c": "一定解除契約", "opt  1", "type": "multiple_choice", "question": "有初驗程序者，機關收齊資料後拖了60日才辦初驗。依第13講，主要問題為何？", "option_a": "有初驗程序者，收齊資料起30日內辦初驗", "option_b": "初驗可無限期延後", "option_c": "初驗一定在驗收後辦", "option_d": "初驗只需廠商自行辦理", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第13講時程控管整理，有初驗程序者，收齊資料起30日內辦初驗；初驗合格後20日內辦理驗收。", "topic": "初驗資料", "source": "Notion：政府採購法 / 第13講 / 再一次"}, {"id": "GPL13B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "某案無初驗程序，機關自廠商通知備驗日起50日才完成驗收。依第13講，主要問題為何？", "option_a": "無初驗程序者，機關應自通知備驗/驗收日起30日內完成驗收並作成紀錄", "option_b": "無初驗程序者不用驗收", "option_c": "無初驗程序者可等一年", "option_d": "無初驗程序者只能部分驗收", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第13講時程控管指出，無初驗程序者，機關應自廠商通知之備驗或驗收日起30日內完成驗收並作成紀錄。", "topic": "無初驗程序", "source": "Notion：政府採購法 / 第13講 / 再一次"}, {"id": "GPL13B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "某履約成果有非重大不符合，但不影響安全與使用需求。依第13講，機關可能如何處理？", "option_a": "得減價收受", "option_b": "必須全案解除且不得收受", "option_c": "一律視為完全合格不減價", "option_d": "不得留下任何紀錄", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第13講第72條整理，非重大不符合且不影響安全與使用需求者，得減價收受。", "topic": "減價收受", "source": "Notion：政府採購法 / 第13講 / 再一次"}, {"id": "GPL13B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "某工程部分已可安全使用且有先行使用必要，機關想先付款該部分。依第13講，應注意何者？", "option_a": "經核准對符合部分辦理部分驗收並支付對應價金，界定計價與保固範圍", "option_b": "不用核准即可付款全部價金", "option_c": "部分驗收不得存在", "option_d": "先行使用一定不需紀錄", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第13講第72條指出，先行使用有必要時，得經核准對符合部分辦理部分驗收並支付對應價金；實務上須明確界定計價與保固起算範圍。", "topic": "部分驗收與先行使用", "source": "Notion：政府採購法 / 第13講 / 再一次"}, {"id": "GPL13B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "某隱蔽工程品質有重大疑慮，廠商主張已封閉不得檢查。依第13講，機關必要時可如何處理？", "option_a": "隱蔽工程得於必要時拆驗", "option_b": "隱蔽工程永遠不得檢查", "option_c": "只能相信廠商口頭保證", "option_d": "直接全案付款", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第13講第72條整理，隱蔽工程得於必要時拆驗，以確認是否符合契約、圖說與規範。", "topic": "隱蔽工程拆驗", "source": "Notion：政府 let current = 0;
let answers = Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const key = 'option_' + letter.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}

function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}

function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}

function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}

function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}

function prevQ() {
  if (current > 0) current--;
  render();
}

function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}

function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}

render();
</script>
