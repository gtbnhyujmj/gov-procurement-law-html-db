": "GPL32B-L1-11", "level": "Level 1", "type": "multiple_choice", "question": "某未達公告金額企劃書評審案，承辦人說一律不得訂底價。依第32講，正確原則為何？", "option_a": "企劃書評審以訂有底價為原則", "option_b": "企劃書評審以不訂底價為唯一原則", "option_c": "企劃書評審不得議價", "option_d": "企劃書評審只能由廠商訂底價", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講比較表指出企劃書評審以訂有底價為原則。", "topic": "企劃書底價", "source": "Notion：政府採購法 / 第32講 / 再一次"}, {"id": "GPL32B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "某第56條最有利標評選委員會只有3人。依第32講，主要問題為何？", "option_a": "最有利標評選委員應為5至17人", "option_b": "最有利標評選委員3人即可", "option_c": "最有利標只能1人評選", "option_d": "最有利標不得設委員會", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講比較表指出最有利標評選人數為5至17人。", "topic": "評選委員人數", "source": "Notion：政府採購法 / 第32講 / 再一次"}, {"id": "GPL32B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "某§49企劃書評審小組只有1人。依第32講，主要問題為何？", "option_a": "企劃書評審小組應為3人以上", "option_b": "企劃書評審1人即可", "option_c": "企劃書評審必須17人以上", "option_d": "企劃書評審不得組小組", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講比較表指出企劃書評審為3人以上評審小組。", "topic": "企劃書評審小組", "source": "Notion：政府採購法 / 第32講 / 再一次"}, {"id": "GPL32B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "最有利標評選委員會全部由機關內部人員組成，完全沒有外聘專家學者。依第32講，主要問題為何？", "option_a": "外聘專家學者不得少於三分之一", "option_b": "不得外聘專家學者", "option_c": "專家學者只能投標廠商推薦", "option_d": "專家學者比例不得超過1人", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出外聘專家學者不得少於三分之一。", "topic": "專家學者比例", "source": "Notion：政府採購法 / 第32講 / 再一次"}, {"id": "GPL32B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "機關在決標前把評選委員名單提供給特定廠商。依第32講，主要問題為何？", "option_a": "評選委員名單決標前應予保密", "option_b": "評選委員名單決標前必須公開給特定廠商", "option_c": "保密只適用履約後", "option_d": "評選委員名單不屬採購資訊", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出評選委員名單在決標前應予保密。", "topic": "決標前保密", "source": "Notion：政府採購法 / 第32講 / 再一次"}, {"id": "GPL32B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "某第56條最有 ", "option_d": "只能用最低價法", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講列評定方式包含總評分法、評分單價法、序位法。", "topic": "評定方法混淆", "source": "Notion：政府採購法 / 第32講 / 再一次"}, {"id": "GPL32B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "依第32講，哪一種評定方式實務最常用？", "option_a": "序位法", "option_b": "抽籤法", "option_c": "猜拳法", "option_d": "先到先贏法", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出序位法為實務最常用。", "topic": "序位法", "source": "Notion：政府採購法 / 第32講 / 再一次"}, {"id": "GPL32B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "招標文件評選標準寫得很模糊，導致廠商無法預測如何評分。依第32講，廠商救濟可連結何條？", "option_a": "§74、§75異議及申訴", "option_b": "§30押標金", "option_c": "§72減價收受", "option_d": "§101不良廠商", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出評選過程違反法令，如評選標準不明確，廠商可依§74、§75提起異議及申訴。", "topic": "標準不明確", "source": "Notion：政府採購法 / 第32講 / 再一次"}, {"id": "GPL32B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "評選委員明顯偏頗，評選過程違反法令。依第32講，廠商可如何處理？", "option_a": "依§74、§75提起異議及申訴", "option_b": "只能等驗收後再說", "option_c": "只能向廠商道歉", "option_d": "不得提出救濟", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第32講指出若評選過程有違反法令，如委員偏頗，廠商可依§74、§75提起異議及申訴。", "topic": "委員偏頗", "source": "Notion：政府採購法 / 第32講 / 再一次"}, {"id": "GPL32B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "遇到最有利標與企劃書案例題時，依第32講，最應先確認哪組事項？", "option_a": "採購是否異質、金額門檻、適用/準用/取精神、評選委員與救濟", "option_b": "只確認廠商地址", "option_c": "只看價格最低者", "option_d": "只問是否有保固保證金", "correct": "只看餐點菜色", "points": 1, "required": "TRUE", "explanation": "A", "topic": "整體判斷骨架", "source": "Notion：政府採購法 / 第32講 / 再一次"}];

function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
