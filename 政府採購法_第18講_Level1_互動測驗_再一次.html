<script>
const questions = [{"id": "GPL18B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某工程決標後，承辦人以為採購工作已結束，後續全部交給廠商自行處理。依第18講，主要錯誤為何？", "option_a": "決標後仍須進入工程履約管理，直到驗收結算與結案", "option_b": "決標後機關完全不用管理", "option_c": "工程只需公告不用履約", "option_d": "履約管理只適用財物採購", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講主軸是工程採購之履約管理，從開工前準備到施工管制、驗收結算與結案，並非決標即結束。", "topic": "履約管理定位", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "某工程沒有施工計畫、品質計畫、安衛計畫、環保計畫與施工日誌，只靠口頭交代施工。依第18講，主要缺失為何？", "option_a": "履約管理文件不足，無法形成可查核之管理脈絡", "option_b": "文件越少越合規", "option_c": "施工日誌不得填寫", "option_d": "品質計畫只適用勞務採購", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講列出施工計畫書、品質計畫、安衛計畫、交通維持計畫、環保執行計畫、土石方計畫、施工日誌、查驗與驗收文件等。", "topic": "文件控管", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "廠商未成立工務所、未現勘，也未做工址與臨房調查即進場施工。依第18講，主要問題為何？", "option_a": "開工前準備不足，應先完成工務所、現勘、工址與臨房調查", "option_b": "開工前不需任何準備", "option_c": "工址調查只在驗收後做", "option_d": "臨房調查只適用財物採購", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講開工前準備包含成立工務所/工地辦公室、工地現勘、工址實地調查與臨房調查等。", "topic": "開工前準備", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "廠商未先協調管線遷移、障礙排除與許可證照，導致開工後停擺。依第18講，較正確作法為何？", "option_a": "及早與機關、使用單位、設計單位協調用地、管線與許可證照", "option_b": "等停工後再處理即可", "option_c": "由居民自行協調", "option_d": "由競爭廠商處理", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講提醒應及早與機關/使用單位/設計單位協調用地取得、障礙排除、管線協調與許可證照，以免延宕。", "topic": "用地協調", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "廠商要求機關額外提供工寮、臨辦用地，主張全部應由機關負責。依第18講，原則為何？", "option_a": "施工所需臨時用地如工寮、臨辦由廠商自理", "option_b": "所有臨時用地均由法院提供", "option_c": "工寮不得設置", "option_d": "臨辦用地由未得標廠商提供", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講區分使用基地由機關指定與提供，施工所需臨時用地如工寮、臨辦由廠商自理。", "topic": "臨時用地", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "某工程工地主任只有掛名，未常駐工地，也未按日填施工日誌。依第18講，主要問題為何？", "option_a": "工地主任原則專任常駐，並應按日填寫施工日誌", "option_b": "工地主任可以只掛名", "option_c": "施工日誌只需完工後補寫", "option_d": "工地主任不得到場", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講指出工地主任原則專任並常駐工地，義務包含按日填寫施工日誌。", "topic": "工地主任掛名", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "工地主任同時兼任兩個大型工程工地，且無機關同意。依第18講，主要問題為何？", "option_a": "工地主任原則不得同時兼任兩工地，大型工程多要求專任", "option_b": "工地主任可任意兼任十個工地", "option_c": "越多兼任越合規", "option_d": "工地主任只看公司安排", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講指出工地主任原則上專任並常駐工地，不得同時兼任兩工地；5000萬以上多要求專任。", "topic": "工地主任兼任", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "工程查驗時工地主任不在場，也無法出示證件說明。依第18講，主要缺失為何？", "option_a": "工地主任查驗/驗收時應在場說明並出示證件", "option_b": "查驗時工地主任不得到場", "option_c": "只需工人代表到場即可", "option_d": "查驗與工地主任完全無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講指出工地主任於查驗或驗收時應在場說明並出示證件。", "topic": "查驗到場", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "某工程金額達6000萬元，廠商未派符合資格之工地主任。依第18講，主要問題為何？", "option_a": "工程金額5000萬元以上屬應派工地主任重點情形", "option_b": "5000萬元以上反而不用工地主任", "option_c": "只有10億元以上才需工地主任", "option_d": "金額與工地主任無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講施行細則第18條舉例，工程金額≥5000萬為工地主任應派情形之一。", "topic": "應派工地主任", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "專任工程人員未審施工計畫，也未督導按圖施工。依第18講，主要缺失為何？", "option_a": "專任工程人員應審查施工計畫、督導按圖施工並處理技術問題", "option_b": "專任工程人員只負責行政收文", "option_c": "專任工程人員不得看圖說", "option_d": "專任工程人員只在驗收後出現", "correct": "A", "points" ct": "A", "points": 1, "required": "TRUE", "explanation": "第18講指出初步/整體施工計畫通常開工後7日內提報，經工程師核准後執行。", "topic": "整體施工計畫逾期", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "重要工項明天開工，廠商今天才臨時口頭說明工法，未提分項施工計畫。依第18講，較正確作法為何？", "option_a": "重要工項分項施工計畫通常應於開工前3日提送", "option_b": "分項施工計畫只能口頭說明", "option_c": "分項計畫完工後補即可", "option_d": "重要工項不需報核", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講指出分項施工計畫於重要工項開工前3日提送，特殊工法另行報核。", "topic": "分項施工計畫", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "工程沒有甘特圖、網狀圖、關鍵路徑或資源配置，只靠廠商口頭估計。依第18講，主要問題為何？", "option_a": "進度控制不足，應有甘特圖/網狀圖、關鍵路徑與資源配置", "option_b": "進度控制不得書面化", "option_c": "甘特圖只適用考試讀書", "option_d": "工程不需要時序安排", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講施工計畫中進度控制包含甘特圖/網狀圖、關鍵路徑、資源配置、時序安排。", "topic": "進度控制", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "主要工項沒有施工SOP、檢查點與停等點，現場憑經驗施工。依第18講，主要問題為何？", "option_a": "施工方法應包含主要工項步驟、檢查點與停等點", "option_b": "停等點只適用財物驗收", "option_c": "SOP不得寫入施工計畫", "option_d": "經驗施工永遠足夠", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講施工計畫內容包含施工方法與SOP，主要工項之步驟、檢查點、停等點。", "topic": "停等點與SOP", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "颱風季施工卻沒有豪雨、地震等預警與地方政府通報鏈結。依第18講，缺少何種計畫內容？", "option_a": "緊急應變計畫", "option_b": "廠商聲明書", "option_c": "評選序位表", "option_d": "押標金轉正", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第18講緊急應變包括颱風豪雨、地震等預警與因應，並與氣象單位及地方政府通報鏈結。", "topic": "緊急應變", "source": "Notion：政府採購法 / 第18講 / 再一次"}, {"id": "GPL18B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "道路施工未做臨時導改、標誌標線、公共安全措施與派員監測，造成交通混亂。依第18講，主要缺失為何？", "option_a": "交通維持計畫不足", "option_b": "剩餘土石方計畫過度完整", "option_c": "履約保證金太高", "option_d": "異議期限太短", "correct" let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
