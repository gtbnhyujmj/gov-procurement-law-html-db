const questions = [{"id": "GPL20B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某同學以為第20講只在講水利案例。依第20講，本講完整主軸較接近何者？", "option_a": "招標、評選、決標到履約與品質管理，並重點說明最有利標程序與委員會運作", "option_b": "只講不良廠商公告", "option_c": "只講土石方申報", "option_d": "只講營業稅稅籍登記", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講聚焦條文規範與實務操作：招標、評選、決標到履約與品質管理，重點說明最有利標程序、適用範圍與委員會運作，並以水利工程案例總結。", "topic": "講次主軸", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "機關臨時更改開標時間與地點，未依招標文件執行。依第20講，主要問題為何？", "option_a": "時間、地點、程序、資格門檻均須依招標文件與法規執行", "option_b": "開標時間可任意改不需通知", "option_c": "資格門檻可現場修改", "option_d": "招標文件只是參考", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講核心觀念強調遵循招標文件與法規，時間、地點、程序、資格門檻均須依文件執行。", "topic": "招標文件遵循", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "某廠商資格不符，機關仍讓其進入評選。依第20講，主要錯誤為何？", "option_a": "資格審查為第一關，不符規定者不得進入評選", "option_b": "資格不符仍應優先評選", "option_c": "資格審查只在決標後做", "option_d": "資格審查可完全省略", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講招標至決標程序指出，資格審查是第一關，不符規定者不得進入評選。", "topic": "資格審查", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "評選委員會與工作小組初審意見不同，但未記錄也未交召集人處理。依第20講，主要問題為何？", "option_a": "不同意見須記錄，提交召集人處理並列入會議紀錄", "option_b": "不同意見必須刪除", "option_c": "工作小組意見不得出現", "option_d": "委員會不得討論", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出評選委員會與工作小組初審意見不同者須記錄，提交召集人處理並列入會議紀錄。", "topic": "評選紀錄", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "評選中發現足以影響採購公正的不當行為，機關仍決標。依第20講與第48條，主要問題為何？", "option_a": "發現違法或不當足以影響公正時，依法不予決標", "option_b": "有不當行為仍必須決標", "option_c": "第48條只管驗收", "option_d": "公平性與決標無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出公平性審查中，若發現違法或不當足以影響公正之行為，依採購法第4 購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "軟體開發、系統整合、網管、機房備援與資料庫服務，依第20講屬何類？", "option_a": "資訊服務", "option_b": "標準化稻米採購", "option_c": "土石方處理", "option_d": "綠色採購標章", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講準用範圍例示中，資訊服務包含軟硬體、系統整合/管理、網管、軟體開發/驗證/維護、機房/備援、資料庫等。", "topic": "資訊服務", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "未達公告金額採購，機關想用較簡化程序取得最符合需要者。依第20講，何者正確？", "option_a": "可採公開取得最符合需要者，首次未滿三家得續辦，強調效率與需求符合", "option_b": "未達公告金額不得公開取得", "option_c": "必須一律完整最有利標", "option_d": "一定不得訂底價", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出未達公告金額可採公開取得最符合需要者，程序簡化，首次未滿三家得續辦，是否訂底價由機關判斷。", "topic": "未達公告金額", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "機關為特定廠商利益遴選評選委員。依第20講，主要問題為何？", "option_a": "不得為特定廠商利益遴選委員，委員會須具公正性與專業性", "option_b": "可為特定廠商選委員", "option_c": "委員只需廠商推薦", "option_d": "長期重複同一人完全無風險", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出成員遴選不得為特定廠商利益，不得接受舉薦，避免長期重複聘同一人，並須具公正性與專業性。", "topic": "委員來源與公正", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "某評選委員會完全由機關內部人員組成，沒有外聘委員。依第20講，主要問題為何？", "option_a": "至少三分之一為外聘", "option_b": "不得有外聘委員", "option_c": "全部內聘最安全", "option_d": "外聘比例無限制", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出評選委員會組成比例至少三分之一為外聘，全員負保密義務。", "topic": "外聘比例", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "評選委員與投標廠商有利害關係，仍參與評選。依第20講，主要問題為何？", "option_a": "與採購有利害關係者應迴避", "option_b": "委員不得迴避", "option_c": "利益衝突越多越好", "option_d": "只有廠商需迴避，委員不用", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出與採購有利害關係者應迴避，委員不得參與該標投標、分包或擔任工作人員。", "topic": "利益衝突迴避", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "委員名單與評選內容未依規定處理，評選前外洩。依第20講，主要問題為何？", "option_a": "評選委員全員負保密義務，名單公開須依規定並經全體同意", "option_b": "委員名單可任意外洩", "option_c": "評選內容越公開越好", "option_d": "保密只適用土石方", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出全員負保密義務，委員名單是否公開須經全體委員同意並依規定辦理。", "topic": "委員保密", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "某工作小組只有2人且無人具採購專業資格。依第20講，主要問題為何？", "option_a": "工作小組至少3人，且至少1人具採購專業資格", "option_b": "工作小組只能1人", "option_c": "工作小組不得有採購專業人員", "option_d": "工作小組不需迴避", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講指出工作小組至少3人，由首長或授權指定，至少1人具採購專業資格，並依第14條辦理迴避。", "topic": "工作小組", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "得標後廠商口頭承諾改規格，機關未簽書面變更就承認生效。依第20講，主要錯誤為何？", "option_a": "非經雙方同意並簽署之書面變更不生效力", "option_b": "口頭變更一定有效", "option_c": "契約變更不得書面", "option_d": "廠商單方說了就算", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講契約管理指出，得標後機關應督促履約，不得任意變更；非經雙方同意並簽署之書面變更不生效力。", "topic": "契約變更", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "某工程只有施工廠商自主管理，沒有監造查核與上級稽核。依第20講，缺少何者？", "option_a": "第70條三級品管中的第二級與第三級", "option_b": "只缺第一級", "option_c": "三級品管只需一級", "option_d": "品質管理只看價格", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講第70條品質管理三級制：第1級施工廠商自主管理，第2級監造/顧問單位獨立查核，第3級機關上級或專責單位稽核/抽查。", "topic": "三級品管", "source": "Notion：政府採購法 / 第20講 / 再一次"}, {"id": "GPL20B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "臺中市水利局橋梁改線案例中，若缺少督導紀錄、改善閉環、監造/施工/品質計畫送審核定文號，依第20講主要問題為何？", "option_a": "未落實第70條品管督導與文件留痕", "option_b": "只是不影響工程的雜事", "option_c": "只會影響廠商廣告", "option_d": "完全與採購法無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第20講水利工程案例強調依第70條實施一、二、三級品管與督導，完善督導紀錄與改善閉環，計畫書須完整送審核定並保留文號與簽 let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
