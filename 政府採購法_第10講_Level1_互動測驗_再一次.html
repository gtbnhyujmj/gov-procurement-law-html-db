<script>
const questions = [{"id": "GPL10B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某機關採購標準規格影印紙，各家產品在品質、功能、規格幾乎無實質差異。依第10講，較適合何種決標方式？", "option_a": "最低標", "option_b": "最有利標", "option_c": "異質最低標", "option_d": "完全不需決標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第10講決策樹為：同質採購原則採最低標。影印紙這類規格明確、性能易統一者，較接近同質採購。", "topic": "同質採購判斷", "source": "Notion：政府採購法 / 第10講 / 再一次"}, {"id": "GPL10B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "某資訊系統採購，各廠商提出的架構、維護模式、資安設計與商業條款差異很大。依第10講，較可能屬於何者？", "option_a": "異質且差異大", "option_b": "完全同質", "option_c": "不得採購", "option_d": "只能用最低標且不審技術", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第10講指出異質是指技術、品質、功能、效益、特性或商業條款存在差異；差異大且規格難單一者，較適合最有利標。", "topic": "異質採購判斷", "source": "Notion：政府採購法 / 第10講 / 再一次"}, {"id": "GPL10B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "某設備採購不是現貨，但差異項目少，機關可訂明確合格標準，合格後再比價格。依第10講，較適合何種方式？", "option_a": "異質最低標", "option_b": "完全抽籤", "option_c": "無條件最有利標", "option_d": "不審規格直接決標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第10講指出異質但差異小者，可採異質最低標；先審是否合格，合格者再比價，以最低標決標。", "topic": "異質最低標", "source": "Notion：政府採購法 / 第10講 / 再一次"}, {"id": "GPL10B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "某專業技術服務案，方案品質、履約團隊、方法論與成果效益差異顯著，難以用單一規格描述。依第10講，較適合何者？", "option_a": "最有利標", "option_b": "同質最低標", "option_c": "完全不用評選", "option_d": "直接最低價得標且不審品質", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第10講指出異質且差異大、規格難單一者，適合採最有利標，尤其專業、技術、資訊服務或重大複雜標的。", "topic": "最有利標適用", "source": "Notion：政府採購法 / 第10講 / 再一次"}, {"id": "GPL10B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "某採購標的規格明確、現貨充足、各廠商產品無實質差異，機關卻只因想主觀挑廠商而採最有利標。依第10講，主要問題為何？", "option_a": "同質標的原則應採最低標，採最有利標須有具體必要性", "option_b": "同質標的一律不得公開招標", "option_c": "最有利標完全不需理由", "option_d": "現貨採購一定要用異質最低標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第10講心法是先判斷同/異質再選決標方式；同質採購原則最低標，最有利標須具體說明不採最低標之理由並核定。", "topic": "錯用最有利標", "source": "Notion：政府採購法 / 第10講 / 再一次"}, {"id": "GPL10B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "判斷同質或異質時，承辦人先問：規格是否明確可單一化？這符合第10講哪一項實務判斷？", "option_a": "規格明確性與可量化程度", "option_b": "廠商名稱是否好聽", "option_c": "投標書封面是否漂亮", "option_d": "承辦人是否熟識廠商", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第10講列出的實務判斷重點包含規格是否明確可單一化、市場供應型態與方案差異程度。", "topic": "規格是否單一化", "source": "Notion：政府採購法 / 第10講 / 再一次"}, {"id": "GPL10B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "某採購標的是大量現貨，性能容易統一；另一案是高度客製服務。依第10講，這是在比較哪一個判斷因素？", "option_a": "市場供應型態", "option_b": "押標金利息", "option_c": "招標文件發售費", "option_d": "政黨投標限制", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第10講實務判斷重點包括市場供應型態，例如現貨與客製的不同，會影響同質/異質判斷。", "topic": "市場供應型態", "source": "Notion：政府採購法 / 第10講 / 再一次"}, {"id": "GPL10B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "某同質採購採最低標，但最低價明顯低到可能無法履約。依第10講，機關不應只看便宜，還應啟動何種控管？", "option_a": "標價偏低之說明、查核與履約風險控管", "option_b": "直接無條件決標", "option_c": "刪除最低價紀錄", "option_d": "改由承辦人私人付款", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第10講指出同質最低標仍須依第58條控管標價偏低，要求說明與查核，必要時不予決標。", "topic": "最低標低價風險", "source": "Notion：政府採購法 / 第10講 / 再一次"}, {"id": "GPL10B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "某案採異質最低標，工作小組卻直接替廠商評優劣、排名次。依第10講，主要問題為何？", "option_a": "異質最低標情境下，工作小組重在審合格與否，不評優劣", "option_b": "工作小組一定要決定得標廠商", "option_c": "異質最低標不得有審查標準", "option_d": "工作小組不得看資格與規格", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第10講指出工作小組提出資格/規格合致初審意見，異質最低標情境不評優劣。", "topic": "異質最低標審查", "source": "Notion：政府採購法 / 第10講 / 再一次"}, {"id": "GPL10B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "某異質最低標案未設明確合格標準，直接進入比價。依第10講，主要缺失為何？", "option_a": "異質最低標應先設明確審查標準，合格後再比價", "option_b": "異質最低標完全不用審查", "option_c": "異質最低標一定不得比價", "option_d": "合格標準只能由得標廠商決定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第10講整理異質最低標要點：設明確審查標準，先審合 "topic": "決策總整理", "source": "Notion：政府採購法 / 第10講 / 再一次"}];
let current = 0;
let answers = Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const key = 'option_' + letter.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}

function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}

function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}

function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}

function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}

function prevQ() {
  if (current > 0) current--;
  render();
}

function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}

function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}

render();
</script>
