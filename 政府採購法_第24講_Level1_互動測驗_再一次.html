<script>
const questions = [{"id": "GPL24B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某同學把第24講只當成機關監督課程，忘了本講是從廠商端談品質管理。依第24講，主要錯誤為何？", "option_a": "第24講重點是從承包商或廠商角度看政府採購品質制度", "option_b": "第24講只談法院審判", "option_c": "第24講只談採購申訴", "option_d": "第24講只談共同供應契約", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講核心是從承包商角度看政府採購品質制度，也就是採購廠商品質管理與履約品質控制。", "topic": "廠商角度", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "廠商認為第70條只約束機關，自己不用建立任何品質管理流程。依第24講，主要錯誤為何？", "option_a": "第70條工程品質管理須落實到廠商履約與施工品質控制", "option_b": "第70條只管異議申訴", "option_c": "第70條只管押標金", "option_d": "第70條讓廠商免除品管", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講雖從廠商角度切入，但仍以採購法第70條工程施工品質管理制度為核心，確保品質、安全與履約成果。", "topic": "第70條落實", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "某工程由未具綜合營造、專業營造或土木包工業資格者承攬。依第24講，主要問題為何？", "option_a": "工程廠商須符合相關營造業資格並受營造業法管理", "option_b": "只要價格最低即可承攬", "option_c": "任何個人都可承攬公共工程", "option_d": "營造業法與公共工程無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講指出政府採購工程廠商須符合綜合營造業、專業營造業、土木包工業等資格，並依營造業法管理。", "topic": "廠商資格", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "某工地只有現場工人，沒有主任技師、工地主任、品管與勞安人員。依第24講，主要缺失為何？", "option_a": "廠商工地組織架構不完整", "option_b": "工地只需要工人即可", "option_c": "品管與勞安不得設置", "option_d": "主任技師只在驗收後出現", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講指出一個工程工地至少包含負責人、主任技師、工地主任、品管人員、勞安人員、現場工程師。", "topic": "工地組織不足", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "工程實際進度落後預定進度，廠商未說明天候、變更設計或土方問題等原因。依第24講，主要問題為何？", "option_a": "進度落後時須說明原因並管控預定進度與實際進度差異", "option_b": "進度落後不用說明", "option_c": "只要最後完工即可不用管進度", "option_d": "進度管理只看廠商心情", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講進度控制重點為預定進度 vs 實際進度；若落後須說明原因，例如天候、變更設計、土方問題、景觀工程延誤。", "topic": "進度落後未說明", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "廠商把電梯設備、門窗與防水材料一進場就直接使用，未送審核准。依第24講，主要錯誤為何？", "option_a": "所有材料設備不能直接使用，須送審、核准、進場、使用", "option_b": "只要有進場即可使用", "option_c": "財物設備不用送審", "option_d": "防水材料可免審", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講材料設備送審制度強調所有材料不能直接使用，必須送審→核准→進場→使用。", "topic": "材料直接使用", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "送審文件只寫材料名稱，未記載送審日期、回覆日期、核准日期、文號與備註。依第24講，主要缺失為何？", "option_a": "送審資料管理不完整", "option_b": "送審文件只需材料名稱", "option_c": "文號不得記載", "option_d": "核准日期不重要", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講指出送審資料應記載項目名稱、送審日期、回覆日期、核准日期、文號、備註。", "topic": "送審紀錄缺漏", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "鋼筋、混凝土、模板、防水等工項未提施工計畫送審，即直接施工。依第24講，主要問題為何？", "option_a": "施工計畫也須送審，不能只送審材料", "option_b": "施工計畫完全不用送審", "option_c": "只有景觀工程須送審", "option_d": "模板工程不得送審", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講指出材料要送審，施工計畫也要送審，例如鋼筋、混凝土、模板、防水、景觀、電梯工程。", "topic": "施工計畫未送審", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "某工程案包含電梯設備、門窗與植栽維護，承辦人仍認為只有純工程採購。依第24講，較正確為何？", "option_a": "工程採購常是混合採購，可能同時包含工程、財物與勞務", "option_b": "工程案絕不包含財物", "option_c": "電梯不屬財物", "option_d": "植栽維護不可能屬勞務", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講強調工程採購常同時包含工程、財物與勞務；電梯、門窗、設備屬財物，景觀植栽、維護工作可屬勞務。", "topic": "混合採購漏判", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "廠商材料尚未送審審查，也未TAF試驗，就先使用，完工後才補文件。依第24講，主要錯誤為何？", "option_a": "材料設備品質流程順序錯誤，應先送審、審查、進場、自主檢查、取樣送驗、TAF試驗再合格使用", "option_b": "完工後補文件即可", "option_c": "不合格也能先用", "option_d": "TAF試驗只需驗收後做", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講材料設備品質流程為送審→審查→進場→自主檢查→取樣送驗→TAF試驗→合格使用→不合格退料。", "topic": "品質流程倒置", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-11", "level": "Level 1", "type": "multiple_choice", "question": "材料檢驗管制表未列檢驗標準、檢驗頻率、抽樣日期、結果與判定。依第24講，主要缺失為何？", "option_a": "材料檢驗管制表未完整建立", "option_b": "檢驗表只需材料名稱", "option_c": "檢驗頻率不得列入", "option_d": "判定不用記錄", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講指出每項材料都要建立名稱、數量、檢驗標準、檢驗頻率、抽樣日期、結果、判定。", "topic": "檢驗管制表不足", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "鋼筋只檢查外觀，未做降伏強度、抗拉強度、伸長率與彎曲試驗。依第24講，主要問題為何？", "option_a": "鋼筋試驗項目不足", "option_b": "鋼筋只需外觀檢查", "option_c": "鋼筋不得做彎曲試驗", "option_d": "伸長率與品質無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講鋼筋試驗項目包含降伏強度、抗拉強度、伸長率、彎曲試驗。", "topic": "鋼筋試驗漏項", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "鋼筋金相試驗發現疑似水淬鋼筋，廠商仍要求使用。依第24講，何者正確？", "option_a": "水淬鋼筋不得使用", "option_b": "水淬鋼筋可優先使用", "option_c": "金相試驗只看顏色", "option_d": "水淬鋼筋與品質無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講指出鋼筋金相試驗目的為檢查鋼筋品質，避免水淬鋼筋；水淬鋼筋不得使用。", "topic": "水淬鋼筋", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "鋼筋接頭使用續接器，但未做拉力、反覆載重、滑動量與延展性試驗。依第24講，主要缺失為何？", "option_a": "續接器試驗項目不足", "option_b": "續接器不用檢驗", "option_c": "只看外觀即可", "option_d": "續接器只需簽名", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講指出續接器試驗項目包含拉力試驗、反覆載重試驗、滑動量、延展性。", "topic": "續接器未驗", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "混凝土只做當日外觀檢查，未看抗壓強度、鑽心試驗與28天養護齡期。依第24講，主要問題為何？", "option_a": "混凝土試驗重點包含抗壓、鑽心與28天養護齡期", "option_b": "混凝土只看外觀", "option_c": "28天養護不重要", "option_d": "抗壓強度不得檢驗", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講混凝土試驗重點包含抗壓強度、鑽心試驗，養護齡期28天最常考。", "topic": "混凝土28天", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "無收縮水泥實測抗壓強度低於210kg/cm²設計值，廠商仍主張合格。依第24講，何者正確？", "option_a": "實測值須高於設計值210kg/cm²", "option_b": "低於設計值仍合格", "option_c": "無收縮水泥不測抗壓", "option_d": "210kg/cm²是瀝青壓實度", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講指出無收縮水泥試驗檢驗抗壓強度，設計值210kg/cm²，實測值須高於設計值。", "topic": "無收縮水泥", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "鋁門窗未做氣密性、水密性與抗風壓能力檢查。依第24講，主要缺失為何？", "option_a": "鋁門窗風雨試驗項目不足", "option_b": "鋁門窗只需看顏色", "option_c": "抗風壓能力不得檢查", "option_d": "水密性與工程品質無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講指出鋁門窗風雨試驗檢查氣密性、水密性、抗風壓能力。", "topic": "鋁門窗風雨試驗", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "混凝土未做氯離子含量檢查，廠商說只要強度夠就好。依第24講，主要錯誤為何？", "option_a": "氯離子試驗是為避免海砂屋，含量須低於規範值", "option_b": "氯離子越高越好", "option_c": "海砂屋與氯離子無關", "option_d": "氯離子只檢查鋁門窗", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講指出氯離子試驗目的為避免海砂屋，檢查氯離子含量須低於規範值。", "topic": "氯離子防海砂屋", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "鋼構材料只看型號，未檢降伏強度、抗拉強度、伸長率與化學成分。依第24講，主要缺失為何？", "option_a": "鋼構材料試驗不足", "option_b": "鋼構只看外觀型號", "option_c": "化學成分不得檢", "option_d": "降伏強度只適用混凝土", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講鋼構材料試驗檢驗降伏強度、抗拉強度、伸長率與化學成分，如碳、錳、磷、硫。", "topic": "鋼構材料試驗", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "瀝青混凝土壓實度只有92%，廠商仍主張達標。依第24講，設計值應如何掌握？", "option_a": "壓實度設計值為95%以上", "option_b": "壓實度80%即可", "option_c": "瀝青不看壓實度", "option_d": "壓實度只看外觀", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講指出瀝青混凝土試驗檢查壓實度，設計值95%以上。", "topic": "瀝青壓實度", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "施工後未自主檢查，也未做停留點檢查與監造查驗，就直接進入下一工序。依第24講，主要錯誤為何？", "option_a": "跳過自主檢查、停留點與監造查驗流程", "option_b": "下一工序越快越合規", "option_c": "停留點不需檢查", "option_d": "監造查驗只在完工後", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講施工流程為施工→自主檢查→停留點檢查→監造查驗→下一工序。", "topic": "停留點跳過", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "品質查核紀錄全部只寫「符合」，沒有強度、壓實度、氯離子等數據。依第24講，主要問題為何？", "option_a": "未落實量化管理，品質應用數據說話", "option_b": "只寫符合最完整", "option_c": "數據越少越好", "option_d": "強度與壓實度不得記錄", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講量化管理強調不能只寫符合，須記錄強度、壓實度、氯離子等量化數據。", "topic": "量化紀錄不足", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "發現品質異常後，廠商只有口頭說會改善，沒有檢討會議、改善計畫、追蹤執行與再次查核。依第24講，主要缺失為何？", "option_a": "未落實矯正與預防措施流程", "option_b": "口頭承諾即可結案", "option_c": "異常不用追蹤", "option_d": "改善計畫不得製作", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講矯正與預防措施流程為發現異常→檢討會議→改善計畫→追蹤執行→再次查核→結案。", "topic": "異常未追蹤", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "工地未辦教育訓練、防洪防災、防墜設施、安全圍籬、施工架管理與巡查。依第24講，主要缺失為何？", "option_a": "未落實勞工安全衛生管理", "option_b": "勞安與品質完全無關", "option_c": "工地巡查不得辦理", "option_d": "防墜設施只適用行政大樓", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講勞工安全衛生包含教育訓練、防洪防災、防墜設施、安全圍籬、施工架管理、工地巡查。", "topic": "勞安缺失", "source": "Notion：政府採購法 / 第24講 / 再一次"}, {"id": "GPL24B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "某工程只有工地主任與品管人員自查，沒有監造、主管機關或工程查核小組外部稽核。依第24講，主要缺少何者？", "option_a": "外部稽核", "option_b": "內部稽核", "option_c": "工地主任", "option_d": "品管人員", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第24講品質稽核分為內部稽核與外部稽核；內部稽核有工地主任、品管人員，外部稽核有監造單位、主管機關、工程查核小組。", "topic": "內外部稽核", "source": "Notion：政府採購法 / 第24講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
