const questions = [{"id": "GPL07B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某承辦人尚未判斷採購標的是工程、財物或勞務，就直接套用招標程序。依第07講，最主要的前置缺失為何？", "option_a": "未先確認標的類型與金額級距", "option_b": "未先確認廠商喜好", "option_c": "未先確認天氣", "option_d": "未先確認主管休假日", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第07講強調採購前兩大確認：標的類型與金額級距；不同類型與門檻會影響程序與審查強度。", "topic": "採購前判斷", "source": "Notion：政府採購法 / 第07講 / 再一次"}, {"id": "GPL07B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "某案包含工程800萬元、設備300萬元、顧問服務100萬元。依第07講，較可能如何歸類？", "option_a": "工程金額占比最高，歸類為工程", "option_b": "只要有設備就歸類為財物", "option_c": "只要有顧問就歸類為勞務", "option_d": "三者混合就完全不適用採購法", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第07講整理複合標的以預算金額占比最高者歸類；本例工程占比最高。", "topic": "複合標的", "source": "Notion：政府採購法 / 第07講 / 再一次"}, {"id": "GPL07B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "某工程採購金額已達公告金額以上，承辦人卻按小額採購簡化辦理。依第07講，主要問題為何？", "option_a": "金額級距判斷錯誤，可能導致程序適用錯誤", "option_b": "公告金額以上一定可以簡化", "option_c": "工程採購永遠不看金額", "option_d": "只要廠商同意即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第07講指出金額級距對應不同程序與審查強度，公告金額以上須公告，不能任意按小額程序處理。", "topic": "金額門檻", "source": "Notion：政府採購法 / 第07講 / 再一次"}, {"id": "GPL07B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "依第07講，公告金額1/10以下得免公告逕行採購時，仍應注意何者？", "option_a": "仍需留痕與比價合理化", "option_b": "可以完全不留任何資料", "option_c": "可直接指定親友廠商且不需理由", "option_d": "不需要任何採購紀錄", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第07講提醒公告金額1/10以下得免公告逕行採購，但仍需留痕與比價合理化。", "topic": "公告金額1/10以下", "source": "Notion：政府採購法 / 第07講 / 再一次"}, {"id": "GPL07B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "某新手不知道共同供應契約、歷史標案統計與GPA資料去哪查。依第07講，較適合先查哪裡？", "option_a": "政府電子採購網", "option_b": "私人網購平台", "option_c": "個人社群動態", "option_d": "飲料店菜單", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第07講整理政府電子採購網可查共同供應契約、歷史標案統計、GPA資料、範本、教育訓練與估價議價工具等。", "topic": "資訊平台", "source": "Notion：政府採購法 / 第07講 / 再一次"}, {"id": "GPL07B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "某承辦人要找招標文件表格、採購手冊、判例與爭議處理案例。依第07講，較適合使用何者？", "option_a": "行政院公共工程委員會網站", "option_b": "私人購物車", "option_c": "廠商私人廣告", "option_d": "承辦人個人相簿", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第07講整理PCC網站提供公共工程法規、招標文件與表格、採購手冊、判例與爭議處理案例等。", "topic": "PCC資源", "source": "Notion：政府採購法 / 第07講 / 再一次"}, {"id": "GPL07B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "某案內容為橋梁修建與機電設備安裝。依第07講，較可能屬於何種採購方向？", "option_a": "工程採購", "option_b": "純勞務採購", "option_c": "財產標售", "option_d": "人事任用", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第07講列示工程包括新建、增建、改建、修建、機械與化工設備安裝與系統工程等。", "topic": "工程採購範圍", "source": "Notion：政府採購法 / 第07講 / 再一次"}, {"id": "GPL07B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "某公共工程涉及建築、消防、機電與室內裝修。依第07講，承辦人應有何認知？", "option_a": "工程採購常連結多種專業法規與專業簽證制度", "option_b": "只看採購法就完全足夠，其他法規都無關", "option_c": "所有專業簽證都可省略", "option_d": "消防與機電永遠不是工程問題", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第07講指出工程面常涉及建築法、消防法、技師法、營造業法、室內裝修管理、機電與環保等周邊法規。", "topic": "周邊法規", "source": "Notion：政府採購法 / 第07講 / 再一次"}, {"id": "GPL07B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "某大型整體工程由未具綜合營造業資格者承攬。依第07講，最主要應注意何者？", "option_a": "承作主體是否具備營造業法所定適當登記與承攬資格", "option_b": "只要價格低即可不看資格", "option_c": "營造業資格完全不影響工程", "option_d": "所有工程都只要土木包工業即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第07講整理營造業法分類包含綜合營造業、專業營造業、土木包工業，各有登記與承攬範圍。", "topic": "營造業資格", "source": "Notion：政府採購法 / 第07講 / 再一次"}, {"id": "GPL07B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "某在地小型綜合工程欲由土木包工業承作。依第07講，土木包工業的定位較接近何者？", "option_a": "向直轄市或縣市主管機關登記，承作在地小型綜合工程", "option_b": "專門承作所有國際巨額捷運工程", "option_c": "完全不需登記即可承作所有工程", "option_d": "只負責法律訴願代理", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第07講整理土木包工業向直轄市或縣市主管機關登記，承作在地小型綜合工程。", "topic": "土木包工業", "source": "Notio 務、統包適用與不適用情形。", "topic": "工程採購新手地圖", "source": "Notion：政府採購法 / 第07講 / 再一次"}];
let current = 0;
let answers = Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const key = 'option_' + letter.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}

function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}

function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}

function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}

function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}

function prevQ() {
  if (current > 0) current--;
  render();
}

function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}

function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}

render();
</script>
