三級為市府/工程會查核，由市府查核小組與外聘委員實施查核，內外部機制併行。", "topic": "三級查核", "source": "Notion：政府採購法 / 第14講 / 再一次"}, {"id": "GPL14B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "外部品質查核指出缺失後，承包商只口頭說會改善，沒有編號、期限與復查。依第14講，較正確作法為何？", "option_a": "缺失應編號、期限、責任到人、復查驗證、列管結案", "option_b": "缺失只要口頭答應即可", "option_c": "查核缺失不得列管", "option_d": "缺失可等工程結案後再處理", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第14講缺失管理要求編號、期限、責任到人、復查驗證、列管結案，並配合PDCA持續改善。", "topic": "缺失列管", "source": "Notion：政府採購法 / 第14講 / 再一次"}, {"id": "GPL14B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "某工程品質查核只有現場口頭討論，沒有照片、試驗報告或會議紀錄。依第14講，主要問題為何？", "option_a": "品質查核應全程留痕，包含文件、照片與試驗報告", "option_b": "品質查核不得留紀錄", "option_c": "只有完工照片即可", "option_d": "試驗報告一定不重要", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第14講查核精神包含內外部機制併行、評分與缺失改善、PDCA循環、全程留痕，包括文件、照片、試驗報告。", "topic": "全程留痕", "source": "Notion：政府採購法 / 第14講 / 再一次"}, {"id": "GPL14B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "某工程為景觀照明優化而追加預算與延長工期，但未提出理由、經費/工期評估與核定文件。依第14講，主要缺失為何？", "option_a": "設計變更應依法程序，提出理由、經費/工期評估、核定文件與追蹤", "option_b": "設計變更完全不需文件", "option_c": "景觀照明不得變更", "option_d": "工期延長只需廠商同意", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第14講新鮮人清單提醒，設計變更依法程序，須提出理由、經費/工期評估、核定文件與追蹤。", "topic": "變更設計", "source": "Notion：政府採購法 / 第14講 / 再一次"}, {"id": "GPL14B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "某工程不審查進度與品質，只按廠商請款全額支付。依第14講，較正確方向為何？", "option_a": "付款應與進度連動，經承包提報、監造審查、機關核付", "option_b": "開工前一次全額付款", "option_c": "付款不用看品質", "option_d": "付款比例由廠商自由決定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第14講案例付款節點依進度分期請領，承包提報、監造審查、機關核付，並強調付款與進度連動。", "topic": "付款與進度", "source": "Notion：政府採購法 / 第14講 / 再一次"}, {"id": "GPL14B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "鋼構工程未控管鋼板與焊材來源，也無製程紀錄。依第14講，主要缺少何者？", "option_a": "鋼構鋼管製程品管與材料來源控管", "option_b": "社區關懷活動", "option_c": "綠色採購標章", "option_d": "居民視覺化溝通", "correct" let current = 0;
let answers = Array(questions.length).fill(null);
function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const key = 'option_' + letter.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}
function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}
function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}
function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}
function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}
function prevQ() {
  if (current > 0) current--;
  render();
}
function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}
function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}
render();
</script>
