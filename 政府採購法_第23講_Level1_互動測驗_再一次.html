<script>
const questions = [{"id": "GPL23B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某機關只在完工驗收時看品質，前面規劃設計、監造與施工過程都放任廠商處理。依第23講，主要問題為何？", "option_a": "工程品質應從規劃設計、監造、施工到改善全生命週期落實", "option_b": "品質只需完工驗收一次", "option_c": "規劃設計與品質無關", "option_d": "監造與品質無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講核心是從規劃設計、監造、施工到品質管理，把品質落實到工程全生命週期。", "topic": "全生命週期品質", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "某工程設計階段很完整，但監造管理鬆散、施工品質控制不足。依第23講，何者正確？", "option_a": "規劃設計、監造管理、施工品質控制三者缺一不可", "option_b": "只要設計好即可", "option_c": "只要承包商便宜即可", "option_d": "只要完工即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講列出工程品質管理三階段：規劃設計、監造管理、施工品質控制，三者缺一不可。", "topic": "三階段缺一不可", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "某工程發生品質缺失，業主、設計監造單位與承包廠商互推責任。依第23講，工程主要參與角色為何？", "option_a": "業主、設計監造單位、承包廠商", "option_b": "只有承包商", "option_c": "只有監造單位", "option_d": "只有新聞媒體", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講工程參與角色包含業主、設計監造單位與承包廠商。", "topic": "角色責任", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "某題問第23講完整案例，考生答成第22講鋼構品質通論。依第23講，案例應為何？", "option_a": "國立故宮博物院南部院區新建工程", "option_b": "中山高速公路拓寬", "option_c": "境外電商平台建置", "option_d": "採購申訴委員會案例", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講指出老師以國立故宮博物院南部院區新建工程作為完整案例。", "topic": "故宮南院案例", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "故宮南院案例中，若考題問其建築工程特色，下列何者較完整？", "option_a": "亞洲藝術文化館、綠建築概念、鋼骨構造、隔震設計", "option_b": "純木造、無隔震、無綠建築", "option_c": "只是一座停車場", "option_d": "只是不良廠商公告案例", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講列出故宮南院特色包含亞洲藝術文化館、綠建築概念、鋼骨構造、隔震設計。", "topic": "案例特色", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "某人只記得綠建築要省電，忘了生物多樣性、綠化量、基地保水。依第23講，主要問題為何？", "option_a": "綠建築九大指標不只日常節能，也包含生物多樣性、綠化量、基地保水等", "option_b": "綠建築只有省電", "option_c": "綠建築只看外觀", "option_d": "綠建築與工程無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講綠建築九大指標包含生物多樣性、綠化量、基地保水、日常節能等。", "topic": "綠建築漏項", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "某工程宣稱綠建築，但不管水資源、污水垃圾改善與廢棄物減量。依第23講，主要缺失為何？", "option_a": "水資源、污水垃圾改善、廢棄物減量皆屬綠建築九大指標", "option_b": "水資源不屬綠建築", "option_c": "污水垃圾與綠建築無關", "option_d": "廢棄物越多越好", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講綠建築九大指標包含CO₂減量、廢棄物減量、室內環境、水資源、污水垃圾改善。", "topic": "綠建築水與廢棄物", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "某工程把隔震器裝在裝飾牆上，說可吸收地震能量。依第23講，常見隔震器位置為何？", "option_a": "基礎與柱腳之間", "option_b": "屋頂廣告牌上", "option_c": "會議室門口", "option_d": "押標金收據旁", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講指出隔震器常設置於基礎與柱腳之間，用以吸收地震能量。", "topic": "隔震位置", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "大型工程概要表沒有業主、設計監造單位、承包商、金額與工期。依第23講，主要問題為何？", "option_a": "大型工程概要表應記載工程名稱、業主、設計監造單位、承包商、地點、金額、工期", "option_b": "概要表只需工程名稱", "option_c": "概要表不得寫金額", "option_d": "概要表與品質完全無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講指出大型工程概要表包含工程名稱、業主、設計監造單位、承包商、地點、工程金額、工期。", "topic": "工程概要表缺漏", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "監造計畫只放封面，沒有督導施工、發現缺失、改善品質的安排。依第23講，主要缺失為何？", "option_a": "監造計畫目的在督導施工、發現缺失、改善品質", "option_b": "監造計畫只需封面", "option_c": "監造不得發現缺失", "option_d": "改善品質不是監造目的", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講指出監造計畫依據工程品質管理作業要點，目的為督導施工、發現缺失、改善品質。", "topic": "監造計畫目的", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-11", "level": "Level 1", "type": "multiple_choice", "question": "施工圖未經監造審查，廠商直接施工。依第23講，主要問題為何？", "option_a": "監造單位應審查施工圖與施工計畫", "option_b": "施工圖不得審查", "option_c": "施工圖只由工人自行判斷", "option_d": "監造只負責拍照", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講監造工作包含審查施工計畫、審查施工圖、查核品質並保存紀錄。", "topic": "監造審圖", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "監造單位只看施工進度，不查材料品質。依第23講，主要缺失為何？", "option_a": "監造單位應查核施工品質與材料品質", "option_b": "材料品質只由廠商口頭保證", "option_c": "材料品質與工程品質無關", "option_d": "監造不得查材料", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講監造單位工作包含查核施工品質與材料品質。", "topic": "材料品質查核", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "工程沒有施工日誌、會議紀錄、進度報告與試驗報告，只留幾張照片。依第23講，主要缺失為何？", "option_a": "工程品質文件管理不足，應保存施工日誌、會議紀錄、進度報告、查驗紀錄、試驗報告等", "option_b": "照片即可取代全部文件", "option_c": "施工日誌不得保存", "option_d": "試驗報告不重要", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講指出文件管理是工程品質的重要基礎，須保存施工日誌、會議紀錄、進度報告、變更設計紀錄、查驗紀錄、試驗報告。", "topic": "文件管理不足", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "工程中多次變更設計，但沒有保存變更設計紀錄。依第23講，主要問題為何？", "option_a": "變更設計紀錄屬工程品質文件管理應保存內容", "option_b": "變更設計不得記錄", "option_c": "變更設計只需口頭說明", "option_d": "變更設計與品質無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講文件管理必須保存變更設計紀錄。", "topic": "變更紀錄", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "材料一進場就直接使用，未自主檢查、監造抽驗或TAF試驗。依第23講，主要錯誤為何？", "option_a": "材料應經進場、自主檢查、監造抽驗、TAF試驗、判定後才合格使用", "option_b": "材料進場即可使用", "option_c": "材料只需廠商口頭保證", "option_d": "TAF試驗只適用驗收後", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講材料抽驗流程為材料進場→自主檢查→監造抽驗→TAF實驗室試驗→結果判定→合格使用，不合格退料。", "topic": "材料進場即使用", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "某承包商自行在工地旁簡單測一測，就取代TAF實驗室試驗。依第23講，主要問題為何？", "option_a": "材料抽驗流程包含TAF實驗室試驗", "option_b": "TAF試驗完全不需要", "option_c": "TAF只管投標文件", "option_d": "TAF是焊工姓名", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講材料抽驗流程明列TAF實驗室試驗。", "topic": "TAF實驗室", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "鋼筋抗拉試驗不合格，廠商仍要求趕工使用。依第23講，應如何處理？", "option_a": "退料或退場，不得使用", "option_b": "趕工時可使用", "option_c": "只要便宜即可使用", "option_d": "等完工後再決定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講指出材料試驗不合格則退料或退場，不得使用。", "topic": "不合格材料", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "混凝土材料只看外觀顏色，不測強度與坍度。依第23講，主要缺失為何？", "option_a": "混凝土應檢查強度與坍度", "option_b": "混凝土只看顏色", "option_c": "混凝土不得抽驗", "option_d": "坍度與品質無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講常見抽驗材料中，混凝土檢查強度與坍度。", "topic": "混凝土抽驗", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "鋼筋進場未檢查抗拉強度與規格尺寸。依第23講，主要缺失為何？", "option_a": "鋼筋應檢查抗拉強度與規格尺寸", "option_b": "鋼筋只看價格", "option_c": "鋼筋不需規格尺寸", "option_d": "鋼筋不得檢查", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講常見抽驗材料中，鋼筋檢查抗拉強度與規格尺寸。", "topic": "鋼筋抽驗", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "鋼構工程只檢查外觀，未查焊道與高強度螺栓。依第23講，主要缺失為何？", "option_a": "鋼構應檢查焊道與高強度螺栓", "option_b": "鋼構只看油漆顏色", "option_c": "高強度螺栓不屬檢查項目", "option_d": "焊道不得檢查", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講常見抽驗材料中，鋼構檢查焊道與高強度螺栓。", "topic": "鋼構抽驗", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "防水工程未檢查防水膜與止水帶。依第23講，主要缺失為何？", "option_a": "防水材料應檢查防水膜與止水帶", "option_b": "防水材料不得抽驗", "option_c": "止水帶與品質無關", "option_d": "防水膜只看包裝", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講常見抽驗材料中，防水材料檢查防水膜與止水帶。", "topic": "防水材料", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "鋼構工程讓未通過資格測驗的焊工直接上工。依第23講，主要錯誤為何？", "option_a": "焊工須通過焊工資格測驗才能施作", "option_b": "焊工可直接上工", "option_c": "焊工只需口頭保證", "option_d": "焊工資格與品質無關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講指出鋼構工程焊工不得直接上工，必須通過焊工資格測驗才能施作。", "topic": "焊工資格", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "鋼筋綁紮完成後，未停下查驗就直接封模澆置混凝土。依第23講，主要違反何者？", "option_a": "停留點 Hold Point，下一工序前必須停下來檢查", "option_b": "公共工程金質獎", "option_c": "不良廠商公告", "option_d": "駐外採購程序", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講指出停留點又稱Hold Point，下一工序開始前必須停下來檢查，例如鋼筋綁紮完成、模板完成、混凝土澆置前。", "topic": "Hold Point", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "發現施工缺失後，機關未開缺失通知，也未要求改善與複驗。依第23講，主要問題為何？", "option_a": "不合格品應開立缺失通知、改善、複驗、合格結案", "option_b": "不合格品可直接結案", "option_c": "缺失通知不得開立", "option_d": "複驗不重要", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講不合格品處理流程為不合格→開立缺失通知→改善→複驗→合格結案。", "topic": "不合格品流程", "source": "Notion：政府採購法 / 第23講 / 再一次"}, {"id": "GPL23B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "工程品質文件完整，但沒有工地巡查、教育訓練與防災演練。依第23講，仍有何缺失？", "option_a": "工程品質之外仍須兼顧勞工安全、工地巡查、教育訓練與防災演練", "option_b": "只要品質文件完整即可完全不管勞安", "option_c": "教育訓練不得做", "option_d": "防災演練只適用學校", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第23講指出工程品質之外，還要兼顧勞工安全、工地巡查、教育訓練、防災演練。", "topic": "勞安落實", "source": "Notion：政府採購法 / 第23講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
