D", "points": 1, "required": "TRUE", "explanation": "第01講標示限制性招標為第22條。", "topic": "條文對應", "source": "Notion：政府採購法 / 第01講"}, {"id": "GPL01-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "依第01講整理，公告金額為新臺幣多少元以上？", "option_a": "10萬元以上", "option_b": "50萬元以上", "option_c": "100萬元以上", "option_d": "1,000萬元以上", "correct": "C", "points": 1, "required": "TRUE", "explanation": "第01講整理公告金額為100萬元以上。", "topic": "採購金額", "source": "Notion：政府採購法 / 第01講"}, {"id": "GPL01-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "依第01講整理，小額採購為新臺幣多少元以下？", "option_a": "1萬元以下", "option_b": "10萬元以下", "option_c": "100萬元以下", "option_d": "1,000萬元以下", "correct": "B", "points": 1, "required": "TRUE", "explanation": "第01講整理小額採購為10萬元以下，可直接採購。", "topic": "採購金額", "source": "Notion：政府採購法 / 第01講"}, {"id": "GPL01-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "依第01講整理，工程採購達多少元以上屬巨額採購？", "option_a": "1,000萬元以上", "option_b": "5,000萬元以上", "option_c": "1億元以上", "option_d": "2億元以上", "correct": "D", "points": 1, "required": "TRUE", "explanation": "第01講整理工程採購巨額門檻為2億元以上。", "topic": "採購金額", "source": "Notion：政府採購法 / 第01講"}, {"id": "GPL01-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "依第01講整理，工程採購達多少元以上屬查核金額？", "option_a": "100萬元以上", "option_b": "1,000萬元以上", "option_c": "5,000萬元以上", "option_d": "2億元以上", "correct": "C", "points": 1, "required": "TRUE", "explanation": "第01講整理工程採購查核金額為5,000萬元以上。", "topic": "採購金額", "source": "Notion：政府採購法 / 第01講"}, {"id": "GPL01-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "依第01講整理，第一次公開招標原則上應有幾家以上廠商？", "option_a": "1家以上", "option_b": "2家以上", "option_c": "3家以上", "option_d": "5家以上", "correct": "C", "points": 1, "required": "TRUE", "explanation": "第01講表格整理公開招標第一次為3家以上。", "topic": "開標家數", "source": "Notion：政府採購法 / 第01講"}, {"id": "GPL01-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "依第01講整理，比價原則上需要幾家以上？", "option_a": "1家以上", "option_b": "2家以上", "option_c": "3家以上", "option_d": " let current = 0;
let answers = Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const btn = document.createElement('button');
    const key = 'option_' + letter.toLowerCase();
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) {
    showFeedback();
  } else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}

function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}

function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}

function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}

function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}

function prevQ() {
  if (current > 0) current--;
  render();
}

function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}

function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}

render();
</script>
