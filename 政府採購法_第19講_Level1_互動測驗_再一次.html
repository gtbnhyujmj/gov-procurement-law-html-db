source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "招標文件未明定重大遲延判準，履約時才臨時主張廠商重大延誤。依第19講，新手應注意何者？", "option_a": "招標文件宜事先明定重大遲延認定基準", "option_b": "重大遲延永遠不得認定", "option_c": "只要承辦人覺得慢即可", "option_d": "重大遲延只看廠商態度", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講實務要點提醒，招標文件宜事先明定重大遲延判準；未載明時可依施行細則示範基準認定。", "topic": "重大遲延基準", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "廠商收到第101條不良廠商通知後第30天才提出異議。依第19講，主要問題為何？", "option_a": "應於收到通知後20日內以書面向招標機關提出異議", "option_b": "異議期限是40天", "option_c": "異議期限是10天", "option_d": "完全沒有異議期限", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講第102條指出，廠商認為第101條通知違法或不實，應於收到通知後20日內，以書面向招標機關提出異議。", "topic": "第102條異議期限", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "廠商不服第101條異議處理結果，第25天才向採購申訴委員會申訴。依第19講，主要問題為何？", "option_a": "應於處理結果送達或期間屆滿後15日內申訴", "option_b": "申訴期限是20天", "option_c": "申訴期限是60天", "option_d": "不良廠商通知不得申訴", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講第102條指出，對機關處理結果不服或機關逾期不處理，應於處理結果送達或期間屆滿後15日內向採購申訴委員會申訴。", "topic": "第102條申訴期限", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "收到第101條通知後，廠商以為只有一個期限。依第19講，正確記憶為何？", "option_a": "20日異議、15日申訴，是兩階段兩時限", "option_b": "10日異議、40日申訴", "option_c": "15日異議、20日申訴", "option_d": "完全無期限", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講實務要點明示，20日異議、15日申訴是兩階段與兩時限，文件往返須保存完整。", "topic": "兩階段救濟", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "廠商被刊登政府採購公報後，仍主張自己可照常投標與分包。依第19講，第103條效果為何？", "option_a": "一定期間內不得參加投標、不得作為決標對象或分包廠商", "option_b": "只影響公司商標", "option_c": "只影響營業稅", "option_d": "只影響環保標章", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講第103條指出，被公告廠商於一定期間內不得參加投標、不得作為決標對象或分包廠商。", "topic": "第103條效果", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-11", "level": "Level 1", "type": "multiple_choice", "question": "機關基於重大公共利益，考慮讓被公告廠商參與特定必要採購。依第19講，應如何看待？", "option_a": "屬例外，須嚴格審酌並保留紀錄", "option_b": "永遠無條件開放", "option_c": "由廠商自行決定", "option_d": "只需口頭同意", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講第103條提到公共利益確有必要者，得依規定處理，但須嚴格審酌、保留紀錄。", "topic": "第103條例外", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "某機密國防採購涉及極機密作戰物資。依第19講，可能適用何種特例？", "option_a": "第104條軍事與國安相關採購特例", "option_b": "第107條文件保存例外", "option_c": "第111條使用效益查核", "option_d": "最有利標評選配分", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講第104條適用武器、彈藥、作戰物資或涉及國家安全/國防目的之採購，機密或極機密採購可免除部分程序。", "topic": "第104條國安採購", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "地震後為維護人民生命、身體、健康與財產，須立即採購搶修材料。依第19講，可能涉及何條？", "option_a": "第105條緊急與特殊情形之不適用", "option_b": "第102條不良廠商異議", "option_c": "第108條稽核小組", "option_d": "第112條倫理準則", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講第105條列舉戰爭、天然災害、重大經濟變故，或維護人民生命、身體、健康、財產之急迫處置。", "topic": "第105條緊急採購", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "駐外機關在外國辦理採購，未於招標文件明定公告、押標金、異議申訴等處理方式。依第19講，主要問題為何？", "option_a": "駐外採購文件應明定公告、公報、押標金、保證金、減價/比價、異議與申訴等處理方式", "option_b": "駐外採購完全不用文件", "option_c": "駐外採購不得依駐在國慣例", "option_d": "駐外採購只看最低標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講第106條指出，駐外機關採購得依駐在國情況或慣例辦理，但招標文件應明定相關處理方式且不得違背條約或協定。", "topic": "第106條駐外採購", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "某機關只保存決標紀錄，刪掉採購計畫、評選、履約、驗收與保固往來紀錄。依第19講，主要問題為何？", "option_a": "採購文件應全生命週期保存並可追溯", "option_b": "只保存決標紀錄即可", "option_c": "履約後文件一律刪除", "option_d": "保固紀錄不得保存", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講第107條指出採購文件保存範圍包含採購計畫、招標、評選、決標、履約、驗收至保固等所有文字或非文字紀錄。", "topic": "第107條文件保存", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "某採購案認為只有主管機關可查核，審計機關不得稽核。依第19講，何者正確？", "option_a": "中央及地方有採購稽核小組，審計機關亦得隨時辦理稽核", "option_b": "審計機關不得查採購", "option_c": "只有廠商能稽核", "option_d": "稽核只在國外採購適用", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講第108條為採購稽核小組，第109條指出審計機關得隨時辦理稽核。", "topic": "第108與109條稽核", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "某工程採購金額達2億元，使用期間卻完全未提報使用情形與效益分析。依第19講，主要問題為何？", "option_a": "大型採購使用期間應提報使用情形與效益分析，主管機關得查核", "option_b": "大型採購不用追蹤效益", "option_c": "只要驗收通過就不能查核", "option_d": "效益分析只適用小額採購", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講第111條指出達一定金額門檻之採購，如工程2億元、其他採購1億元，使用期間應提報使用情形與效益分析，主管機關得派員查核。", "topic": "第111條效益查核", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "採購人員接受廠商不當招待並影響評選。依第19講，較涉及何種規範精神？", "option_a": "第112條採購人員倫理準則", "option_b": "第103條禁入期間", "option_c": "第106條駐外採購", "option_d": "第111條效益查核", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講第112條指出主管機關訂定採購人員倫理準則，並銜接評選行為之倫理要求。", "topic": "第112條倫理", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "某承辦人要採最有利標，但完全不知道法源依據。依第19講，最有利標的重要法源不包括下列何者？", "option_a": "採購法第52條、施行細則第66條、評選委員會組織準則、最有利標作業辦法", "option_b": "刑事訴訟法羈押規定", "option_c": "採購法第52條", "option_d": "最有利標作業辦法", "correct": "B", "points": 1, "required": "TRUE", "explanation": "第19講列出最有利標法源包含採購法第52條、施行細則第66條、評選委員會組織準則、最有利標作業辦法與倫理準則。", "topic": "MAT法源", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "某案為資訊系統建置與專案管理服務，各廠商技術與管理能力差異大。依第19講，較可能適用何種決標方式？", "option_a": "最有利標", "option_b": "同質最低標", "option_c": "財產變賣", "option_d": "小額逕洽", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講指出最有利標典型適用於委託技術服務、專業服務、資訊服務、設計監造、專案管理、統包工程等異質性標的。", "topic": "MAT適用範圍", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "某標的不同廠商在技術、品質、功能、管理能力與履約績效差異顯著。依第19講，較屬何種標的？", "option_a": "異質標的，宜考慮最有利標", "option_b": "同質規格品，一律最低標", "option_c": "不適用採購法", "option_d": "不得採評選", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講指出異質是指不同廠商在技術、品質、功能、效益、商業條款、管理能力、履約績效等有顯著差異。", "topic": "異質判斷", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "某機關採購標準化物資，規格與品質要求清楚，市場供品差異很小。依第19講，較適合何種策略？", "option_a": "同質標的，宜最低標", "option_b": "異質標的，必然最有利標", "option_c": "一定限制性招標", "option_d": "一定複數決標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講指出同質標的規格與品質要求清楚且市場供品差異很小，例如標準化物資，宜最低標。", "topic": "同質判斷", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "某機關將高度異質的建築設計服務用最低標處理，後續發生品質與履約爭議。依第19講，主要提醒為何？", "option_a": "異質標的若用最低標，易引發爭議與履約風險", "option_b": "異質標的只能抽籤", "option_c": "建築設計不得評選", "option_d": "最低標一定適合所有標的", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講實務要點指出，若採最低標處理異質標的，易引發爭議與履約風險；差異大宜最有利標。", "topic": "錯用最低標", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "機關採最有利標，但招標文件未揭示評選項目、配分與權重。依第19講，主要問題為何？", "option_a": "招標文件應清楚揭示評選項目、配分、權重", "option_b": "評選項目應完全保密", "option_c": "評選可事後臨時決定", "option_d": "只看委員自由心證即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講實務提醒，若採最有利標，應明確揭示評選項目、配分與權重；補抓結果也確認招標文件須清楚揭示評選項目、配分、權重。", "topic": "評選項目揭示", "source": "Notion：政府採購法 / 第19講 / 再一次"}, {"id": "GPL19B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "某最有利標評選標準寫成「看起來順眼者最高分」，無具體評估基準。依第19講，主要問題為何？", "option_a": "評選項目與配分應可衡量、可驗證，以選出整體最有利者", "option_b": "評選標準越模糊越好", "option_c": "不得考量品質技術", "option_d": "價格以外一律不得評分", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第19講強調最有利標應同時考量價格、品質、技術、功能、效益、商業條款等，並建立可衡量、可驗證之評選項目與配分。", "topic": "可衡量可驗證", "source": "Notion：政府採購法 / 第19講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
