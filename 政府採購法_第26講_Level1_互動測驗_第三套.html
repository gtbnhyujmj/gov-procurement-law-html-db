處理", "option_b": "§6公平公開", "option_c": "§65禁止轉包", "option_d": "§14禁止分批", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第26講指出§58低價處理：標價低於底價80%時，應要求廠商說明或提供擔保。", "topic": "低價說明", "source": "Notion：政府採購法 / 第26講 / 第三套"}, {"id": "GPL26C-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "異常低價處理不是為了懲罰便宜，而是為了防止何種問題？", "option_a": "低價搶標造成履約風險", "option_b": "公開招標太透明", "option_c": "廠商太多競爭", "option_d": "驗收太快完成", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第26講指出低價處理目的在防範低價搶標風險。", "topic": "低價履約風險", "source": "Notion：政府採購法 / 第26講 / 第三套"}, {"id": "GPL26C-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "得標廠商不得把整個契約轉給他人履行，但可依法將部分工作交由他人完成。依第26講，這是在區分何者？", "option_a": "禁止轉包與合法分包", "option_b": "公開與限制招標", "option_c": "異議與申訴", "option_d": "公告與小額", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第26講指出§65禁止轉包，但允許合法分包。", "topic": "轉包與分包", "source": "Notion：政府採購法 / 第26講 / 第三套"}, {"id": "GPL26C-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "依第26講，驗收時限口訣最接近何者？", "option_a": "7送、30驗、20正式、15證明", "option_b": "3年、2親等、80%、95%", "option_c": "10萬、100萬、2億、1億", "option_d": "公開、選擇、限制、統包", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第26講列驗收時限：完工7日內送件、30日內驗收、20日內正式驗收、15日內核發證明。", "topic": "驗收時限口訣", "source": "Notion：政府採購法 / 第26講 / 第三套"}, {"id": "GPL26C-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "同一採購需求被故意拆成數個小額案，只為避開公告金額程序。依第26講，主要違反何者？", "option_a": "§14禁止意圖規避採購法而故意分批採購", "option_b": "§65合法分包", "option_c": "§58低價說明", "option_d": "§18選擇性招標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第26講指出§14禁止意圖規避採購法而故意分批採購。", "topic": "分批規避", "source": "Notion：政府採購法 / 第26講 / 第三套"}, {"id": "GPL26C-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "若不同需求、不同時間、不同標的而分別採購，與故意規避門檻不同。第26講提醒重點在於何者？", "option_a": "是否意圖規避採購法", "option_b": "是否每件都同一廠商", "option_c": "是否金額越低越好", "option_d": "是否完全不用紀錄", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第26講禁止的是意圖規避採購法而故意分批採購。", "topic": "合理分批判斷", "source": "Notion：政府採購法 / 第26講 / 第三套"}, {"id": "GPL26C-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "廠商對招標文件或決標結果不服，依第26講應優先想到何種爭議程序？", "option_a": "異議、申訴", "option_b": "調解、仲裁、訴訟", "option_c": "刑事自首", "option_d": "民法繼承回復", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第26講國考複習要點區分招標/決標階段之異議與申訴。", "topic": "招標決標救濟", "source": "Notion：政府採購法 / 第26講 / 第三套"}, {"id": "GPL26C-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "廠商已得標並進入履約階段，因契約履行發生爭議。依第26講應注意何種程序？", "option_a": "調解、仲裁、訴訟", "option_b": "異議、申訴為唯一程序", "option_c": "公開招標", "option_d": "小額採購", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第26講國考複習要點區分履約階段之調解、仲裁、訴訟。", "topic": "履約爭議救濟", "source": "Notion：政府採購法 / 第26講 / 第三套"}, {"id": "GPL26C-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "第26講總複習仍提醒再確認§15迴避義務與何種限制？", "option_a": "離職人員旋轉門限制", "option_b": "瀝青壓實度限制", "option_c": "焊工資格測驗", "option_d": "綠建築九指標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第26講國考複習要點提醒利益迴避須再確認§15迴避義務與離職人員旋轉門限制。", "topic": "利益迴避回扣", "source": "Notion：政府採購法 / 第26講 / 第三套"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
