ple_choice", "question": "依第1講整理，比價原則上需要幾家以上？", "option_a": "1家以上", "option_b": "2家以上", "option_c": "3家以上", "option_d": "4家以上", "correct": "B", "points": 1, "required": "TRUE", "explanation": "第1講整理比價為2家以上。", "topic": "開標家數", "source": "Notion：政府採購法 [空大錄影] / 01"}, {"id": "GPL01-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "依第1講整理，最低標與最有利標的差異，下列何者正確？", "option_a": "最低標重價格，最有利標重整體評估", "option_b": "最低標一定不能用於政府採購", "option_c": "最有利標只看價格最低", "option_d": "二者完全相同，只是名稱不同", "correct": "A", "points": 1, "required": "TRUE", "explanation": "最低標以價格最低為核心；最有利標則綜合評估價格、品質、技術、經驗等。", "topic": "決標方式", "source": "Notion：政府採購法 [空大錄影] / 01"}, {"id": "GPL01-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "依第1講整理，關於分批採購與分別採購，下列何者正確？", "option_a": "任何拆分採購都一定合法", "option_b": "為規避採購法而故意分批，原則上不可以", "option_c": "只要拆成兩案就一定不用適用採購法", "option_d": "分別採購與故意分批規避完全相同", "correct": "B", "points": 1, "required": "TRUE", "explanation": "不得故意分批採購以規避採購法；不同標的、地點或需求則可能構成可分別採購。", "topic": "分批與分別採購", "source": "Notion：政府採購法 [空大錄影] / 01"}, {"id": "GPL01-L1-26", "level": "Level 1", "type": "multiple_choice", "question": "依第1講整理，原住民族地區未達公告金額之採購，原則上應優先由何者承辦？", "option_a": "外國廠商", "option_b": "任一最低價廠商", "option_c": "原住民個人、機構或法人", "option_d": "中央主管機關指定之學校", "correct": "C", "points": 1, "required": "TRUE", "explanation": "第1講整理原住民族地區未達公告金額採購，應優先由原住民個人、機構、法人承辦。", "topic": "原住民族保障", "source": "Notion：政府採購法 [空大錄影] / 01"}];
let current = 0;
let answers = Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current+1} / ${questions.length} 題｜主題：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('feedback').textContent = '';
  const opts = ['A','B','C','D'];
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  opts.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q['option_' + letter.toLowerCase()]}`;
    btn.onclick = () => choose(letter, btn);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  updateScore();
}

function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}

function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}

function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s,a,i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}

function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}

function prevQ() {
  if (current > 0) current--;
  render();
}

function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}

function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q,i) =>
    `<p><strong>${i+1}. ${q.correct}</strong>｜${q.explanation}</p>`
  ).join('');
}

render();
</script>
