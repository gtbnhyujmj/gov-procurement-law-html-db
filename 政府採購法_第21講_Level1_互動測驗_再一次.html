const questions = [{"id": "GPL21B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某同學把第21講全部時間都花在背台灣鐵路與公路歷史，忽略第70條。依第21講，主要問題為何？", "option_a": "歷史是背景，真正規範核心是第70條三級品管與查核小組作業辦法", "option_b": "歷史背景才是唯一法規核心", "option_c": "第70條完全不用讀", "option_d": "查核小組只屬歷史背景", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講明確說明前半歷史為背景知識，後半第70條品質管理制度與工程施工查核小組作業辦法才是較適合出題的規範內容。", "topic": "本講考點取捨", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "工程發生重大災害與弊案後，機關卻認為採購制度不需修正。依第21講，較正確理解為何？", "option_a": "921、88風災與重大弊案促使制度透過異議、申訴、仲裁等機制強化", "option_b": "重大災害與採購制度完全無關", "option_c": "弊案只會使制度廢止", "option_d": "災害後工程品質可不查核", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出921地震、88風災與重大弊案促使政府採購制度持續修正與強化。", "topic": "制度強化背景", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "某題問台灣第一次空間革命，第21講中應抓哪個關鍵？", "option_a": "民國50至75年交通建設轉以公路為主，中山高與橫貫公路完成", "option_b": "2007年高鐵通車", "option_c": "全民督工制度建立", "option_d": "採購法第101條公告", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講將民國50至75年公路建設發展、中山高速公路與橫貫公路完成，稱為第一次空間革命。", "topic": "第一次空間革命", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "某題問西部走廊一日生活圈，第21講中較接近何者？", "option_a": "國道3號全線通車並配合西部濱海快速公路", "option_b": "劉銘傳鐵路基隆到新竹", "option_c": "桃園大圳興建", "option_d": "第70條品管三級制", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出1991至2007年國道3號全線通車，配合西部濱海快速公路，形成第二次空間革命與一日生活圈。", "topic": "第二次空間革命", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "某水利工程只追求硬體防洪，完全不考慮流域、生態與環境。依第21講，較欠缺何種現代觀念？", "option_a": "流域整體規劃、綜合治水與生態工法", "option_b": "只蓋更多道路", "option_c": "只看最低標", "option_d": "只做不良廠商公告", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出1991至2007年後水利建設重視流域整體 s": 1, "required": "TRUE", "explanation": "第21講工程施工查核小組作業辦法指出，查核方式以不預先通知方式辦理抽查。", "topic": "查核預告", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "某查核小組一年只查1件工程，且遠低於當年度工程標的20%。依第21講講者口述，可能問題為何？", "option_a": "查核金額原則不低於當年度執行工程標的20%，且不得少於20件", "option_b": "查1件必然足夠", "option_c": "不得查超過1件", "option_d": "只查金額最大的案即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講講者口述查核比例原則上不低於當年度執行工程標的20%，且不得少於20件；實際仍以正式條文為準。", "topic": "查核比例誤解", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "施工查核時廠商專任工程人員與工地主任都不到場。依第21講，主要問題為何？", "option_a": "廠商專任工程人員與工地主任應到場配合查核", "option_b": "查核只需警衛到場", "option_c": "廠商不得到場", "option_d": "只需民眾到場", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出查核到場人員包含機關代表、建築師/技師/監造人員，以及廠商專任工程人員、工地主任等。", "topic": "查核到場配合", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "查核紀錄只寫『大致良好』，未記錄規劃設計、生態環保、材料設備、圖說變更。依第21講，主要缺失為何？", "option_a": "查核紀錄應涵蓋工程規劃設計、生態環保、材料設備、圖說變更等", "option_b": "查核紀錄越簡短越好", "option_c": "查核不得記錄材料設備", "option_d": "圖說變更不得列入紀錄", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出查核紀錄內容涵蓋工程規劃設計、生態環保、材料設備、圖說變更等項目。", "topic": "查核紀錄不足", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "查核小組完成紀錄後，兩個月才送機關且未登錄政府採購公報。依第21講，主要問題為何？", "option_a": "原則應於7個工作日內送機關並登錄於政府採購公報", "option_b": "可無限期延後", "option_c": "不得登錄採購公報", "option_d": "只有丙等才需送機關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出查核小組完成紀錄後，原則於7個工作日內將結果送機關，並登錄政府採購公報。", "topic": "查核結果遲延", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "某工程查核85分，依第21講講者口述分級，應屬何等？", "option_a": "甲等", "option_b": "優等", "option_c": "乙等", "option_d": "丙等", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講查核成績分級為90分以上優等、80分以上未滿90分甲等、70分以上未滿80分乙等、未達70分丙等。", "topic": "成績分級", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "某工程查核68分，依第21講講者口述分級，應屬何等？", "option_a": "丙等", "option_b": "優等", "option_c": "甲等", "option_d": "乙等", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講查核成績未達70分為丙等。", "topic": "成績分級", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "鋼筋混凝土試體強度不合格，或瀝青混凝土厚度、品質不符規範。依第21講，可能屬何種結果？", "option_a": "列為丙等之常見情節", "option_b": "必然優等", "option_c": "不得列入查核", "option_d": "只影響出席費", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講列為丙等常見情節包含鋼筋混凝土試體強度不合格、路面瀝青混凝土厚度或品質不符規範等。", "topic": "丙等情節", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "夯實度/壓實度試驗不合格，主要結構與設計不符。依第21講，可能導致何種查核評價？", "option_a": "丙等", "option_b": "優等", "option_c": "甲等", "option_d": "不列入評分", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講列為丙等常見情節包含夯實度/壓實度試驗不合格、主要結構與設計不符、材料重大瑕疵等。", "topic": "丙等情節", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "工程被列丙等且情節重大，機關卻完全不處理相關品管、勞安人員。依第21講，可能後續為何？", "option_a": "可對品管、勞安人員議處，嚴重者通知公會並移送懲戒", "option_b": "丙等必然獎勵", "option_c": "丙等不得追究任何人", "option_d": "丙等只代表民眾滿意", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出列為丙等可能對相關品管人員、勞安人員議處；情節嚴重者可能通知建築師/技師公會並移送懲戒。", "topic": "丙等後果", "source": "Notion：政府採購法 / 第21講 / 再一次"}, {"id": "GPL21B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "工地沒有工程告示牌，也沒有全民督工通報資訊。依第21講，主要缺少何種透明化機制？", "option_a": "全民督工機制與工程告示牌", "option_b": "不良廠商公告", "option_c": "駐外採購程序", "option_d": "最有利標協商", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第21講指出工地現場應設工程告示牌、公告牌，並建置全民督工通報系統，使民眾了解工程資訊並通報監督。", "topic": "全民督工", "source": "Notion：政府採購法 / 第21講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
