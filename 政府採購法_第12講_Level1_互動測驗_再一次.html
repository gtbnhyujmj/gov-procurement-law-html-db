const questions = [{"id": "GPL12B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某機關要買辦公設備，採購網共同供應契約已有符合需求品項，承辦人卻直接自行找廠商。依第12講，較正確方向為何？", "option_a": "項目與規格相符時，原則上優先使用共同供應契約", "option_b": "共同供應契約只是參考，永遠不得使用", "option_c": "共同供應契約只適用私人企業", "option_d": "只要自行找廠商比較快即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第12講新鮮人清單指出，共同供應契約項目與規格相符即優先採用，具環保標章者更應優先。", "topic": "共同供應契約使用", "source": "Notion：政府採購法 / 第12講 / 再一次"}, {"id": "GPL12B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "某共同供應契約品項有多家廠商與服務條件，承辦人想比較價格與服務。依第12講，契約通常可提供哪些資訊？", "option_a": "案號、契約起迄、廠牌型號、價目與服務條件", "option_b": "廠商員工私人薪資", "option_c": "承辦人家庭資料", "option_d": "評選委員私人電話", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第12講指出共同供應契約會載明採購案號、契約起迄、廠牌型號、價目與服務條件，供查核與比較。", "topic": "共同供應契約查核", "source": "Notion：政府採購法 / 第12講 / 再一次"}, {"id": "GPL12B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "某共同供應品項有環保標章商品，承辦人未說明理由直接改買一般商品。依第12講，主要問題為何？", "option_a": "具環保標章者原則優先，不採用須敘明理由並核准", "option_b": "環保標章商品一律不得採購", "option_c": "環保標章與採購完全無關", "option_d": "只要一般商品較熟悉即可跳過", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第12講綠色採購指出符合環保標章者優先使用；不採用者須敘明、核准後方得改採其他商品。", "topic": "綠色採購", "source": "Notion：政府採購法 / 第12講 / 再一次"}, {"id": "GPL12B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "某共同供應契約10萬元以上設備到貨後，使用單位尚未測試，廠商即要求先開發票付款。依第12講，較正確處理為何？", "option_a": "先行測試，必要時正式驗收合格後始得開立發票", "option_b": "一律先付款再驗收", "option_c": "共同供應契約完全免測試", "option_d": "由廠商自行宣布驗收合格", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第12講提示10萬元以上交貨地點應先行測試，必要時通知使用單位或事務單位辦理正式驗收，合格後始得開立發票。", "topic": "共同供應驗收", "source": "Notion：政府採購法 / 第12講 / 再一次"}, {"id": "GPL12B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "機關買電腦時，想順便附加採購與電腦無關的禮品。依第12講，額外項主要問題為何？", "option_a": "額外項須與主項有直接關聯", "option_b": "額外項可以完全無關", "option_c": "額外項不得有任何金額限制", "option_d": "額外項可免所有程序", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第12講說明額外項或附加採購是主項採購附帶增購之項目，須與主項有直接關聯。", "topic": "額外項關聯", "source": "Notion：政府採購法 / 第12講 / 再一次"}, {"id": "GPL12B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "主項採購金額80萬元，附加項金額20萬元。依第12講以十分之一為例，主要疑義為何？", "option_a": "20萬元超過主項80萬元的十分之一，可能不符附加採購比例限制", "option_b": "附加項必須高於主項金額", "option_c": "附加項金額完全不受限制", "option_d": "只要未達公告金額即可無限制附加", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第12講以附加採購金額不逾主項金額十分之一為例；80萬元的十分之一為8萬元。", "topic": "額外項比例", "source": "Notion：政府採購法 / 第12講 / 再一次"}, {"id": "GPL12B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "某承辦人認為只要是主項附加項，就完全不用比價、議價或留證。依第12講，何者正確？", "option_a": "即使是附加採購，必要招標、比價或議價程序不得當然免除", "option_b": "附加採購永遠免程序", "option_c": "附加採購由廠商自行決定價格即可", "option_d": "附加採購不得電子訂購", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第12講指出即使是附加採購，招標/比議價等程序不得免除，仍應依未達公告金額採購辦法等辦理並留證。", "topic": "附加採購程序", "source": "Notion：政府採購法 / 第12講 / 再一次"}, {"id": "GPL12B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "某共同供應契約品項不符特殊需求，機關要自行採購。依第12講，較完整作法為何？", "option_a": "填具不採用共同供應契約申請書，載明具體理由、程序與法源，經核定後辦理", "option_b": "直接自行買即可，不需說明", "option_c": "只要廠商願意報價即可免用", "option_d": "共同供應契約不符需求時也絕對不能自行採購", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第12講指出具正當理由可免用共同供應契約，但應填具申請書，載明規格不符之具體理由、擬採程序與法源，經權責核定。", "topic": "免用共同供應", "source": "Notion：政府採購法 / 第12講 / 再一次"}, {"id": "GPL12B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "下列何者較可能是第12講所稱免用共同供應契約的正當理由？", "option_a": "網站查無特定DVD/CD，或既有契約到期且新約未生效", "option_b": "承辦人不想登入系統", "option_c": "共同契約價格透明不方便操作", "option_d": "熟識廠商希望直接交易", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第12講列出共同供應契約項目不符需求、網站查無或既有契約到期且新約未生效等，可能作為正當理由。", "topic": "免用理由", "source": "Notion：政府採購法 / 第12講 / 再一次"}, {"id": "GPL12B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "某單位多人共用同一組二代採購網帳號密碼下單。依第12講，主要問題為何？", "option_a": "二代採購網為個人帳號制，應依個人身分申請與管理", "option_b": " "level": "Level 1", "type": "multiple_choice", "question": "某共同供應契約廠商報價偏高，承辦人想爭取更優條件。依第12講，可參考何者作為議價依據？", "option_a": "歷史決標價", "option_b": "承辦人直覺", "option_c": "廠商廣告詞", "option_d": "私人聊天內容", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第12講節省公帑策略指出，可參考歷史決標價作為議價依據，要求共同供應契約廠商提供更優條件。", "topic": "歷史決標價", "source": "Notion：政府採購法 / 第12講 / 再一次"}];
let current = 0;
let answers = Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const key = 'option_' + letter.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}

function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}

function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}

function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}

function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}

function prevQ() {
  if (current > 0) current--;
  render();
}

function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}

function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}

render();
</script>
