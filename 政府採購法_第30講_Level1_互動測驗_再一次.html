const questions = [{"id": "GPL30B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某機關開標後才說本案可以共同投標，招標文件完全沒寫。依第30講，主要錯誤為何？", "option_a": "允許共同投標須先於招標文件載明", "option_b": "共同投標可開標後口頭同意", "option_c": "共同投標不用文件", "option_d": "共同投標只看廠商意願", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出機關允許共同投標之基本規定，重點是招標文件須先載明。", "topic": "共同投標載明", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "甲公司同時以個別廠商投標，又加入乙丙共同投標團隊。依第30講，原則上如何？", "option_a": "同一採購案成員不得重複以個別或其他共同投標身分投標", "option_b": "只要甲公司有實力即可重複投標", "option_c": "共同投標一定可以重複參與", "option_d": "只有得標後才禁止重複", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出同一採購案中，成員不得重複以個別或他共同投標身分投標。", "topic": "成員重複投標", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "某採購涉及專利技術，若完全禁止成員重複參與會不利競爭。依第30講，機關應如何處理例外？", "option_a": "可在招標文件明訂例外", "option_b": "可由廠商事後自行決定", "option_c": "不得寫入招標文件", "option_d": "開標後由評委臨時決定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出涉及專利或特殊專業技術，或禁止重複參與不利競爭時，可在招標文件明訂例外。", "topic": "特殊技術例外", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "共同投標文件只有其中一家公司業務簽名，其他成員未共同簽署，也未依協議書指定代表。依第30講，主要問題為何？", "option_a": "投標文件簽署不完整", "option_b": "只要任一業務簽名即可", "option_c": "共同投標不得簽署", "option_d": "簽署只在驗收後需要", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出投標文件須由各成員負責人/代理人共同簽署，或依共同投標協議書之指定代表人簽署。", "topic": "簽署缺漏", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "共同投標協議書沒有公證或認證，承辦人說有蓋章就好。依第30講，主要錯誤為何？", "option_a": "共同投標協議書需公證或認證", "option_b": "共同投標協議書只要口頭即可", "option_c": "公證認證只適用驗收文件", "option_d": "共同投標不得有協議書", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出共同投標協議書需公證或認證，原則以中文；涉外採購須符合招標文件並附中文譯本。", "topic": "協議書未認證", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "涉外共同投標協議書只有外文版本，未附中文譯本，也不符招標文件。依第30講，主要問題為何？", "option_a": "涉外採購雖得用外文，但須附中文譯本並符合招標文件規範", "option_b": "外文版本永遠充分", "option_c": "共同投標協議書不得中文", "option_d": "中文譯本只供廠商內部參考", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出協議書原則中文，涉外採購得以外文，但須附中文譯本並符合招標文件。", "topic": "協議書語言", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "共同投標協議書未載明代表廠商、授權權限、各成員主辦項目與契約金額比例。依第30講，主要缺失為何？", "option_a": "協議書必載事項不完整", "option_b": "這些事項可得標後再口頭補", "option_c": "協議書只需標案名稱", "option_d": "契約金額比例不得記載", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講列共同投標協議書必載事項，包括代表廠商、代表人、授權權限、責任分工、主辦項目與契約金額比例。", "topic": "責任分工不明", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "共同投標協議書只寫『大家盡量配合』，未明確寫投標後或得標後連帶履約責任。依第30講，主要問題為何？", "option_a": "連帶履約責任應明確不可含糊", "option_b": "連帶責任不得記載", "option_c": "只要寫配合即可", "option_d": "共同投標各成員一定免責", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出共同投標協議書應明確記載投標後或得標後之連帶履約責任。", "topic": "連帶責任含糊", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "共同投標文件沒有說明由代表廠商統一請領或各成員分別請領，也無項目金額對應。依第30講，主要缺失為何？", "option_a": "價金請領方式未明確約定", "option_b": "共同投標不得請款", "option_c": "請款方式一律由機關猜測", "option_d": "價金只能由最小成員請領", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出協議書應載明價金請領方式，代表統一請領或各成員分別請領，並對應項目與金額。", "topic": "價金請領混亂", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "共同投標成員之一破產後，協議書完全沒有替代履約安排。依第30講，主要缺失為何？", "option_a": "協議書應載明成員破產或重大情事時之替代履約安排", "option_b": "破產後契約自動變更為同等品", "option_c": "破產成員一定免責且不用安排", "option_d": "替代履約不得約定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講列協議書必載事項包括成員破產或重大情事無法續約時，由其他成員承接或另行指定等安排。", "topic": "成員破產安排", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-11", "level": "Level 1", "type": "multiple_choice", "question": "得標後代表廠商未經機關同意，私自變更共同投標協議書責任分工。依第30講，何者正確？", "option_a": "未經機關同意不得變更協議書內容", "option_b": "代表廠商可任意變更", "option_c": "得標後協議書不再重要", "option_d": "變更只需通知其他廠商不用通知機關", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出未經機關同意不得變更共同投標協議書內容，得標後協議書應納入契約。", "topic": "協議書任意變更", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "機關已通知共同投標代表人，其他成員主張自己未收到所以完全無效。依第30講，何者正確？", "option_a": "機關對代表人之通知視同對全體成員通知", "option_b": "通知代表人完全無效", "option_c": "必須逐一親送每位員工", "option_d": "只通知會計才有效", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出機關對共同投標代表人之通知，視同對全體成員通知。", "topic": "通知效力", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "共同投標完成後，某成員主張全部履約實績都算自己。依第30講，業績認列應依何者？", "option_a": "協議書載明之主辦項目與比例", "option_b": "誰聲音大就算誰", "option_c": "一律由代表廠商全拿", "option_d": "一律平均且不得約定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出業績認列依協議書載明之主辦項目與比例，於檢收/驗收後據實認列各成員履約實績。", "topic": "業績歸屬", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "廠商說品牌名稱類似，所以不需規格、性能比對即可視為同等品。依第30講，主要錯誤為何？", "option_a": "同等品不以品牌等同為準，須規格/性能比對與必要檢測", "option_b": "品牌相似即可同等", "option_c": "同等品不得檢測", "option_d": "同等品只看包裝顏色", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講提醒不以品牌等同即視為同等品，需通過規格/性能比對與必要檢測。", "topic": "同等品品牌迷思", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "同等品投標時未提出廠牌、價格、功能、效益、標準/規格、特性之比對表。依第30講，主要缺失為何？", "option_a": "未提出完整功能比對表", "option_b": "同等品不用表格", "option_c": "只需寫價格即可", "option_d": "只需寫廠商口號", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出同等品功能比對表至 "topic": "監驗職掌誤解", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "驗收紀錄未記載是否逾期、契約金額變更、檢核結果與各角色簽章。依第30講，主要缺失為何？", "option_a": "驗收紀錄欄位不完整，影響日後舉證", "option_b": "驗收紀錄越少越好", "option_c": "只要拍一張照片即可", "option_d": "逾期與變更不得記錄", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講列初驗/驗收紀錄應含履約期間、是否逾期、契約金額與變更、檢核結果及主驗、會驗、協驗、監驗簽章紀錄。", "topic": "驗收紀錄不足", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "機關廢標後一個月才刊登無法決標公告。依第30講，主要問題為何？", "option_a": "廢標公告應於廢標日後14日內刊登", "option_b": "廢標公告可一年後刊登", "option_c": "廢標不用公告", "option_d": "廢標只能口頭通知", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出廢標公告應於廢標日後14日內刊登無法決標公告。", "topic": "廢標公告逾期", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "投標截止前機關發布補充招標文件，但未延長投標截止日。依第30講，原則問題為何？", "option_a": "應延長投標截止日，至少延長5日", "option_b": "補充文件不得延長", "option_c": "延長只適用驗收後", "option_d": "一律延長6個月", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出投標截止前發布變更或補充招標文件，原則須延長投標截止日，至少延長5日。", "topic": "變更文件未延長", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "機關取消或暫停招標後未作重大變更，卻過很久才想重啟。依第30講，最長得於多久內重啟？", "option_a": "6個月內", "option_b": "14日內", "option_c": "5日內", "option_d": "2年內", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出取消或暫停後未作重大變更，最長得於6個月內重啟，並應考量原已公告或招標天數。", "topic": "暫停招標重啟", "source": "Notion：政府採購法 / 第30講 / 再一次"}, {"id": "GPL30B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "未達公告金額採公開招標且未提供電子領標時，依第30講，等標期原則不得少於多久？", "option_a": "7日", "option_b": "5日", "option_c": "14日", "option_d": "6個月", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第30講指出未達公告金額採公開招標且未提供電子領標時，等標期原則不得少於7日。", "topic": "電子領標等標期", "source": "Notion：政府採購法 / 第30講 / 再一次"}];
let current=0; let answers=Array(questions.length).fill(null);
function render(){const q=questions[current];document.getElementById('progress').textContent=`第 ${current+1} / ${questions.length} 題｜考點：${q.topic}`;document.getElementById('question').textContent=q.question;const optBox=document.getElementById('options');optBox.innerHTML='';['A','B','C','D'].forEach(letter=>{const key='option_'+letter.toLowerCase();const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q[key]}`;btn.onclick=()=>choose(letter);if(answers[current]){if(letter===q.correct)btn.classList.add('correct');else if(letter===answers[current])btn.classList.add('wrong')}optBox.appendChild(btn)});if(answers[current])showFeedback();else{document.getElementById('feedback').style.display='none';document.getElementById('feedback').textContent=''}updateScore()}
function choose(letter){if(!answers[current])answers[current]=letter;render()}
function showFeedback(){const q=questions[current];const selected=answers[current];const ok=selected===q.correct;const fb=document.getElementById('feedback');fb.style.display='block';fb.textContent=`${ok?'答對':'答錯'}。正解：${q.correct}。${q.explanation}`}
function updateScore(){const done=answers.filter(Boolean).length;const correct=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0);document.getElementById('score').textContent=`目前作答：${done} / ${questions.length}；答對：${correct} 題`}
function nextQ(){if(current<questions.length-1)current++;render()} function prevQ(){if(current>0)current--;render()}
function restart(){answers=Array(questions.length).fill(null);current=0;document.getElementById('answerList').style.display='none';render()}
function showAnswers(){const box=document.getElementById('answerList');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML='<h2>答案表</h2>'+questions.map((q,i)=>`<p><strong>${i+1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`).join('')}
render();
</script></body></html>
