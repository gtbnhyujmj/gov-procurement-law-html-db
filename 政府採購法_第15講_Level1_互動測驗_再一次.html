quired": "TRUE", "explanation": "第15講列出查核金額（勞務）為1,000萬元以上；1,200萬元已達勞務查核金額。", "topic": "金額級距", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "某勞務採購預算2,500萬元。依第15講，已達何種級距？", "option_a": "巨額勞務採購", "option_b": "小額採購", "option_c": "未達公告金額", "option_d": "巨額財物採購", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講列出巨額勞務採購為2,000萬元以上；2,500萬元已達巨額勞務。", "topic": "金額級距", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "某財物採購預算1.2億元。依第15講，已達何種級距？", "option_a": "巨額財物採購", "option_b": "巨額勞務採購", "option_c": "小額採購", "option_d": "未達公告金額", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講列出巨額財物採購為1億元以上；1.2億元已達巨額財物採購。", "topic": "金額級距", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "某採購金額9萬元。依第15講金額級距，屬於何者？", "option_a": "小額採購", "option_b": "公告金額以上", "option_c": "巨額採購", "option_d": "查核金額以上", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講列出小額採購為10萬元以下；9萬元屬小額採購。", "topic": "小額採購", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "某財物採購金額150萬元。依第15講，至少已達何種級距？", "option_a": "公告金額以上", "option_b": "小額採購", "option_c": "巨額財物", "option_d": "完全不適用採購法", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講列出公告金額為100萬元以上；150萬元已達公告金額。", "topic": "公告金額", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "某機關每月固定採購便當、文具與清潔服務，需求長期且經常。依第15講，較可考慮何種招標方式？", "option_a": "選擇性招標", "option_b": "完全免招標", "option_c": "刑事扣押", "option_d": "財產變賣", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講指出選擇性招標適用於長期、經常採購，例如便當、文具、辦公用品、印刷、機電維護、清潔服務。", "topic": "選擇性招標", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "某選擇性招標只建立3家合格廠商名單。依第15講，主要問題為何？", "option_a": "應建立6家以上合格廠商名單", "option_b": "選擇性招標只能1家", "option_c": "選擇性招標不得有名單", "option_d": "3家一定等於限制性招標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講指出選擇性招標建立6家以上合格廠商名單，之後再邀請投標。", "topic": "合格名單", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "某公開招標案無廠商投標而流標，機關考慮改採限制性招標。依第15講，這屬於何種常見適用情形？", "option_a": "無廠商投標", "option_b": "同質採購", "option_c": "財產出租", "option_d": "教育訓練", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講限制性招標適用情況包括無廠商投標、獨家供應、緊急事故、後續擴充。", "topic": "限制性招標", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "某設備只有原廠零件能替換，市場無替代品。依第15講，可能屬限制性招標何種理由？", "option_a": "獨家供應", "option_b": "分批採購", "option_c": "選擇性招標", "option_d": "同質最低標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講限制性招標適用情況包括獨家供應，例如原廠零件、專利產品、藝術品且無替代品。", "topic": "限制性招標", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "地震造成公共安全設備損壞，必須立即處理。依第15講，可能符合限制性招標何種理由？", "option_a": "緊急事故", "option_b": "後續擴充", "option_c": "同質採購", "option_d": "財產處分", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講列出緊急事故如地震、水災、公共安全事故，必須立即處理時，可能適用限制性招標。", "topic": "緊急事故", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "某系統由A公司建置，原招標文件已載明後續模組擴充，後續因相容性與一致性需要向A公司辦理。依第15講，較接近何種限制性招標情形？", "option_a": "後續擴充", "option_b": "違法分批", "option_c": "財產變賣", "option_d": "小額採購", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講後續擴充例子為原系統由A公司建置，後續增加模組為維持相容性、一致性，可向原廠辦理，但須原契約或原招標文件先載明。", "topic": "後續擴充", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "某系統案決標後，機關才想到要追加模組，原契約與原招標文件都未載明後續擴充。依第15講，主要問題為何？", "option_a": "後續擴充不可事後才想到，原契約或原招標文件必須先載明", "option_b": "只要原廠同意就一定合法", "option_c": "後續擴充永遠不需載明", "option_d": "只要追加金額小即可無條件擴充", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講強調後續擴充必須原契約與原招標文件已載明；事後才想到擴充，違法。", "topic": "後續擴充錯誤", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "某機關買大量影印紙，各品牌規格與品質差異不大。依第15講，較適合何種決標方式？", "option_a": "最低標", "option_b": "最有利標", "option_c": "議價決標", "option_d": "完全不用決標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講指出同質採購產品差異不大，例如影印紙、水泥、鋼筋，決標方式為最低標。", "topic": "同質採購", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "某機關採購顧問服務，廠商專業能力、方法論與成果品質差異明顯。依第15講，較接近何者？", "option_a": "異質採購，可依性質採最低標或最有利標", "option_b": "同質採購，只能最低標", "option_c": "財產處分", "option_d": "完全不需招標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講指出異質採購品質差異明顯，例如軟體系統、顧問服務、設計服務，決標方式可為最低標或最有利標。", "topic": "異質採購", "source": "Notion：政府採購法 / 第15講 / 再一次"}, {"id": "GPL15B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "某案採異質最低標，審查合格後應如何決標？", "option_a": "合格最低價", "option_b": "綜合最佳", "option_c": "抽籤決定", "option_d": "由廠商自行宣布", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講比較表指出，異質最低標決標為合格最低價；最有利標則是綜合最佳。", "topic": "異質最低標與最有利標", "source": "Notion：政府採購法 / 第15講 / 再一次"}];
let current = 0;
let answers = Array(questions.length).fill(null);
function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const key = 'option_' + letter.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}
function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}
function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}
function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}
function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}
function prevQ() {
  if (current > 0) current--;
  render();
}
function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}
function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}
render();
</script>
</body>
</html>
