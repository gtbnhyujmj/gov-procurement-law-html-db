const questions = [{"id": "GPL05B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某採購承辦人離職後第2年，受廠商委託回原服務機關接觸同類採購案。依第05講，主要問題為何？", "option_a": "可能違反離職後3年內不得就原服務機關採購接觸或處理之限制", "option_b": "離職後第2年已完全不受限制", "option_c": "只要廠商付費就可自由接觸", "option_d": "只要改用電話聯絡就不算接觸", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講整理，承辦或兼辦採購人員離職後3年內，不得為本人或代理廠商，就其原服務機關之採購接觸或處理。", "topic": "離職後限制", "source": "Notion：政府採購法 / 第05講 / 不同方向"}, {"id": "GPL05B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "某評選委員發現投標廠商負責人是其配偶。依第05講，較適當處理為何？", "option_a": "主動揭露並迴避", "option_b": "繼續評選但不告知任何人", "option_c": "要求該廠商先得標再補文件", "option_d": "只要分數給低一點即可不迴避", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講整理，涉及本人、配偶或三親等內親屬之採購事務，應主動迴避。", "topic": "利益迴避", "source": "Notion：政府採購法 / 第05講 / 不同方向"}, {"id": "GPL05B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "某機關開評選會前，主持人未詢問與會人員是否有利害關係。依第05講，較完整的內控作法為何？", "option_a": "開標或評選前由主持人宣示並請與會人員揭露利害關係", "option_b": "等廠商抗議後才處理即可", "option_c": "由主持人自行猜測誰有關係", "option_d": "禁止所有人揭露利害關係", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講提醒機關應建立利益衝突申報與迴避流程，開標或評選前由主持人宣示並請與會人員揭露。", "topic": "利益衝突內控", "source": "Notion：政府採購法 / 第05講 / 不同方向"}, {"id": "GPL05B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "某採購案決標後才發現承辦人未迴避與親屬相關之採購事務。依第05講，主要風險為何？", "option_a": "產生公平性與爭議風險，應啟動調查與必要補救", "option_b": "既然已決標就一定完全沒問題", "option_c": "可以刪除相關紀錄避免爭議", "option_d": "只需要求廠商私下道歉", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講指出若事後發現未迴避且已決標，將產生公平性與爭議風險，應啟動調查與必要補救處理。", "topic": "未迴避後果", "source": "Notion：政府採購法 / 第05講 / 不同方向"}, {"id": "GPL05B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "某議員電話要求機關把招標規格改成特定品牌。依第05講，機關應如何處理較妥？", "option_a": "作成書面、文字或錄音等紀錄並留存備查", "option_b": "不留紀錄，直接照辦", "option_c": "只在私人手機刪除通話紀錄", "option_d": "等決標後再假裝沒發生", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講整理，對採購案件的請託關說，需以書面、文字或錄音等方式作成紀錄，留存備查；指定品牌屬應注意事項。", "topic": "請託關說", "source": "Notion：政府採購法 / 第05講 / 不同方向"}, {"id": "GPL05B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "廠商於驗收後要求機關更改驗收結果。依第05講，這類聯絡是否仍需記錄？", "option_a": "需要，驗收期間與驗收後之請託關說也須記錄", "option_b": "不需要，只有招標前才要記錄", "option_c": "不需要，只有開標當天才要記錄", "option_d": "不需要，只要是驗收後都自由處理", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講列出請託關說涵蓋招標前、招標後、契約履行或驗收期間與驗收後，均須記錄。", "topic": "請託關說時點", "source": "Notion：政府採購法 / 第05講 / 不同方向"}, {"id": "GPL05B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "某機關採購案有大量口頭、傳真、電子郵件指示。依第05講，較佳制度設計為何？", "option_a": "建立標準化聯絡或請託登錄表，將指示與聯絡形成紀錄", "option_b": "只記得大概內容即可", "option_c": "一律不收電子郵件", "option_d": "只記錄對機關有利的部分", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講建議建立標準化聯絡或請託登錄表與錄音機制，口頭、傳真、電子方式之指示或聯絡一律形成紀錄。", "topic": "聯絡登錄", "source": "Notion：政府採購法 / 第05講 / 不同方向"}, {"id": "GPL05B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "某外國廠商參與我國政府採購，機關文件卻完全未考量我國國際承諾。依第05講，主要問題為何？", "option_a": "涉及國際承諾案件，文件與程序須符合承諾範圍與門檻", "option_b": "外國廠商永遠不得參與政府採購", "option_c": "外國廠商參與時完全不必看條約協定", "option_d": "只要廠商國籍不同就可任意排除", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講整理外國廠商參與政府採購，應依我國參與之條約與協定辦理，例如WTO GPA；涉及國際承諾者須符合承諾範圍與門檻。", "topic": "外國廠商", "source": "Notion：政府採購法 / 第05講 / 不同方向"}, {"id": "GPL05B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "某軍購案涉及國安與機密，機關欲採特殊例外處理。依第05講，何者最重要？", "option_a": "須有充分法律依據與書面理由", "option_b": "只要主管口頭同意即可", "option_c": "可以完全不留任何資料", "option_d": "由廠商自行決定例外範圍", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講提醒軍購等特殊類型如涉及國安或機密，得依法定例外處理，但須有充分法律依據與書面理由。", "topic": "國安例外", "source": "Notion：政府採購法 / 第05講 / 不同方向"}, {"id": "GPL05B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "某公告金額以上採購，承辦人因方便直接採限制性招標，未說明法條依據。依第05講，主要缺失為何？", "option_a": "方法選擇須有法條依據與書面理由", "option_b": "限制性招標永遠不需理由", "option_c": "公告金額以上不得採公開招標", "option_d "GPL05B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "某案允許共同投標，但實際上只是讓原本可互相競爭的廠商抱團排除其他競爭者。依第05講，機關應注意何者？", "option_a": "防止共同投標變相限制競爭，資格與能力相互補強須有正當性", "option_b": "共同投標一定越少競爭越好", "option_c": "共同投標完全不用審查正當性", "option_d": "只要廠商願意聯合就必須接受", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第05講提醒應防止以共同投標變相限制競爭，資格與能力相互補強需有正當性。", "topic": "共同投標限制競爭", "source": "Notion：政府採購法 / 第05講 / 不同方向"}];
let current = 0;
let answers = Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const key = 'option_' + letter.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}

function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}

function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}

function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}

function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}

function prevQ() {
  if (current > 0) current--;
  render();
}

function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}

function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}

render();
</script>
