<body>
<div class="wrap">
  <div class="card">

    <div class="meta">本講主軸：財物採購、勞務採購、混合採購、分批/分別採購、金額級距、選擇性招標、限制性招標、後續擴充與同質/異質採購。</div>

    <div class="nav">
      <button onclick="prevQ()">上一題</button>
      <button onclick="nextQ()">下一題</button>
      <button onclick="restart()">重新開始</button>

    </div>
    <div id="answerList" style="display:none; margin-top:20px;"></div>
  </div>
</div>

採購例子", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-12", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，下列何者屬不適用政府採購法、較適用財產管理法規的情形？", "option_a": "財產出租或變賣", "option_b": "購買電腦", "option_c": "委託清潔服務", "option_d": "系統維護", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講指出財產處分如出租、變賣，屬國有財產法或地方財產管理法範圍，不適用政府採購法。", "topic": "不適用採購法", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-13", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，將120萬元採購故意拆成60萬加60萬以規避採購法，屬於何者？", "option_a": "違法分批採購", "option_b": "合法分別採購", "option_c": "共同供應契約", "option_d": "開口契約", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講舉例，120萬拆成60萬加60萬以規避採購法，屬違法分批採購。", "topic": "分批採購", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-14", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，符合哪些情形時可分別採購？", "option_a": "不同標的、不同地點、不同需求", "option_b": "同一需求故意拆小", "option_c": "只為規避公告金額", "option_d": "把同一批設備拆開發票", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講指出，不同標的、不同地點、不同需求時，可以分別採購。", "topic": "分別採購", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-15", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，巨額財物採購的金額門檻為何？", "option_a": "1億元以上", "option_b": "2,000萬元以上", "option_c": "1,000萬元以上", "option_d": "100萬元以上", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講金額級距表列出，巨額財物採購為1億元以上。", "topic": "金額級距", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-16", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，巨額勞務採購的金額門檻為何？", "option_a": "2,000萬元以上", "option_b": "1億元以上", "option_c": "100萬元以上", "option_d": "10萬元以下", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講金額級距表列出，巨額勞務採購為2,000萬元以上。", "topic": "金額級距", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-17", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，勞務採購查核金額為何？", "option_a": "1,000萬元以上", "option_b": "100萬元以上", "option_c": "10萬元以下", "option_d": "1億元以上", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講金額級距表列出，查核金額（勞務）為1,000萬元以上。", "topic": "金額級距", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-18", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，公告金額為何？", "option_a": "100萬元以上", "option_b": "10萬元以下", "option_c": "1,000萬元以上", "option_d": "2,000萬元以上", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講金額級距表列出，公告金額為100萬元以上。", "topic": "金額級距", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-19", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，小額採購的金額為何？", "option_a": "10萬元以下", "option_b": "100萬元以上", "option_c": "1,000萬元以上", "option_d": "1億元以上", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講金額級距表列出，小額採購為10萬元以下。", "topic": "小額採購", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-20", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，選擇性招標常適用於何種採購？", "option_a": "長期採購、經常採購", "option_b": "一次性私人買賣", "option_c": "完全無需求確認的採購", "option_d": "刑事偵查採購", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講指出選擇性招標適用於長期採購、經常採購，例如便當、文具、印刷、清潔服務等。", "topic": "選擇性招標", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-21", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，選擇性招標建立合格廠商名單通常要求幾家以上？", "option_a": "6家以上", "option_b": "1家以上", "option_c": "2家以上", "option_d": "100家以上", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講指出選擇性招標建立6家以上合格廠商名單，之後再邀請投標。", "topic": "合格廠商名單", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-22", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，限制性招標的操作不包括下列何者？", "option_a": "比價2家以上或議價1家", "option_b": "完全不需法定事由即可指定廠商", "option_c": "獨家供應", "option_d": "緊急事故", "correct": "B", "points": 1, "required": "TRUE", "explanation": "第15講整理限制性招標是不公開招標，直接比價2家以上或議價1家；適用如流標、獨家供應、緊急事故、後續擴充等情形。", "topic": "限制性招標", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，後續擴充成立的必要條件之一為何？", "option_a": "原契約或原招標文件已載明", "option_b": "事後才想到即可", "option_c": "只要廠商願意即可", "option_d": "不需相容性需求", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講指出後續擴充必須原契約已載明、原招標文件已載明，並有相容性需要與原廠供應必要。", "topic": "後續擴充", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，下列何者較屬同質採購，通常採最低標？", "option_a": "影印紙、水泥、鋼筋", "option_b": "軟體系統", "option_c": "顧問服務", "option_d": "設計服務", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講指出同質採購產品差異不大，例如影印紙、水泥、鋼筋，決標方式為最低標。", "topic": "同質採購", "source": "Notion：政府採購法 / 第15講"}, {"id": "GPL15-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "依第15講，異質最低標與最有利標的決標差異為何？", "option_a": "異質最低標為合格最低價，最有利標為綜合最佳", "option_b": "兩者完全相同", "option_c": "最有利標只看最低價", "option_d": "異質最低標完全不看價格", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第15講比較表指出，異質最低標決標為合格最低價；最有利標決標為綜合最佳。", "topic": "異質最低標與最有利標", "source": "Notion：政府採購法 / 第15講"}];
let current = 0;
let answers = Array(questions.length).fill(null);
function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const key = 'option_' + letter.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}
function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}
function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}
function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}
function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}
function prevQ() {
  if (current > 0) current--;
  render();
}
function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}
function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}
render();
</script>
</body>
</html>
