ice", "question": "某案預算500萬，機關卻決標520萬。依第16講，主要問題為何？", "option_a": "決標金額不得超過預算金額", "option_b": "決標金額越高越好", "option_c": "預算與決標金額無關", "option_d": "只要廠商同意即可超預算", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第16講強調預算金額應大於等於決標金額，不可決標金額大於預算金額。", "topic": "預算與決標金額", "source": "Notion：政府採購法 / 第16講 / 再一次"}, {"id": "GPL16B-L1-23", "level": "Level 1", "type": "multiple_choice", "question": "某標價低於底價80%，機關懷疑顯不合理與低價搶標。依第16講，機關得要求何者？", "option_a": "要求廠商提出說明或提供擔保", "option_b": "一定直接決標且不得審查", "option_c": "一定免驗收", "option_d": "由其他廠商補價", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第16講第58條重點指出，標價低於底價80%可能顯不合理，機關得要求提出說明或提供擔保。", "topic": "低於底價80%", "source": "Notion：政府採購法 / 第16講 / 再一次"}, {"id": "GPL16B-L1-24", "level": "Level 1", "type": "multiple_choice", "question": "依第16講，驗收紀錄應載明下列何者？", "option_a": "案號、驗收標的、數量、日期、結果", "option_b": "承辦人私人行程", "option_c": "廠商廣告文案", "option_d": "評審委員星座", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第16講驗收重點指出，驗收紀錄應載明案號、驗收標的、數量、日期、結果。", "topic": "驗收紀錄", "source": "Notion：政府採購法 / 第16講 / 再一次"}, {"id": "GPL16B-L1-25", "level": "Level 1", "type": "multiple_choice", "question": "某案買10台設備，其中3台規格不符。依第16講，可採何種處理方式？", "option_a": "退貨、換貨、改善、復驗", "option_b": "一律視為全部合格", "option_c": "不得要求改善", "option_d": "直接付款且不得記錄", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第16講驗收不合格處理指出，例如10台設備中3台規格不符，可退貨、換貨、改善、復驗。", "topic": "驗收不合格與付款", "source": "Notion：政府採購法 / 第16講 / 再一次"}];
let current = 0;
let answers = Array(questions.length).fill(null);
function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const key = 'option_' + letter.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}
function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}
function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}
function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}
function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}
function prevQ() {
  if (current > 0) current--;
  render();
}
function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}
function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}
render();
</script>
</body>
</html>
