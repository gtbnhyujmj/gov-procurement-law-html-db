<script>
const questions = [{"id": "GPL09B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某廠商對招標文件規格有疑義，但未在文件規定期限內提出，等決標後才主張規格不明。依第09講，主要問題為何？", "option_a": "示疑應在文件規定期限內以書面提出，逾期可能影響其權利主張", "option_b": "廠商只能用電話示疑，不得書面", "option_c": "招標文件疑義只能驗收後提出", "option_d": "決標後第一次示疑一定使廠商直接得標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第09講§41強調供應商應在文件規定期限內以書面示疑，並保留書面軌跡。", "topic": "示疑逾期", "source": "Notion：政府採購法 / 第09講 / 再一次"}, {"id": "GPL09B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "機關修改招標文件的重要規格後，只私下通知一家廠商，且未評估延長等標期。依第09講，何者最正確？", "option_a": "重要變更應書面通知並必要時公告、延長等標期", "option_b": "只通知一家廠商即可維持公平", "option_c": "招標文件不得任何變更", "option_d": "變更後只能直接廢標", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第09講§41指出機關變更或補充招標文件，應書面通知並視需要延長等標期，必要時公告。", "topic": "文件變更", "source": "Notion：政府採購法 / 第09講 / 再一次"}, {"id": "GPL09B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "某案等標期為12日，機關只給1日示疑期間。依第09講細則整理，最低示疑期間較合理應為何者？", "option_a": "至少等標期1/4，12日的1/4為3日", "option_b": "固定只能1日", "option_c": "必須等標期全程12日", "option_d": "示疑期間不得設定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第09講整理可請求示疑期間至少為等標期1/4，不足1日以1日計。12日的1/4為3日。", "topic": "示疑期間", "source": "Notion：政府採購法 / 第09講 / 再一次"}, {"id": "GPL09B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "某分段開標案，承辦人於資格標階段誤拆價格標封。依第09講，主要風險為何？", "option_a": "違反分段開標文件密封與錯段不得開啟之公平要求", "option_b": "價格標越早拆越公平", "option_c": "分段開標必須一次全部拆封", "option_d": "資格標不能先開", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第09講§42提醒未開啟之段文件保持密封，流程與標示要明確，避免錯段開啟。", "topic": "分段開標", "source": "Notion：政府採購法 / 第09講 / 再一次"}, {"id": "GPL09B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "某案採資格、規格、價格分段開標。廠商資格未通過，卻要求進入價格標。依第09講，何者正確？", "option_a": "未通過前段不得進入後段", "option_b": "未通過資格仍一定可開價格標", "option_c": "分段開標不得設資格段", "option_d": "價格標應先於資格標開啟", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第09講§42整理可採分段開標或分段投標，未通過前段不得進入後段。", "topic": "分段開標", "source": "Notion：政府採購法 / 第09講 / 再一次"}, {"id": "GPL09B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "某評選案將國內貨品比率、技術移轉、投資、外銷協助加分合計設為50%。依第09講，主要問題為何？", "option_a": "該類加分合計不得逾1/3，50%可能超過上限", "option_b": "國內化加分至少必須80%", "option_c": "國內化加分完全不得出現", "option_d": "只要是本國品加分就完全不受限制", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第09講§43指出國內貨品比率、技術移轉、投資、外銷協助等可列評選要素，但合計權重或金額比例不得逾1/3。", "topic": "國內偏好", "source": "Notion：政府採購法 / 第09講 / 再一次"}, {"id": "GPL09B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "某GPA適用標案仍直接設定本國廠商優惠，未檢查國際承諾。依第09講，應先做何事？", "option_a": "確認該偏好是否受國際協定限制或可否適用", "option_b": "所有GPA標案都可無限制本國優先", "option_c": "GPA標案不需要任何公告", "option_d": "只要國內廠商同意即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第09講提醒涉及國際承諾者從其規定，標案若受GPA拘束，應先確認偏好可否適用。", "topic": "國際協定", "source": "Notion：政府採購法 / 第09講 / 再一次"}, {"id": "GPL09B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "某廠商認為開標時不需派代表，結果現場發生減價與程序疑義，無人即時處理。依第09講，實務建議為何？", "option_a": "建議派代表出席，以因應減價與程序疑義", "option_b": "廠商代表不得出席開標", "option_c": "只有承辦人親屬可出席", "option_d": "開標現場不得處理任何程序疑義", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第09講§45實務提醒，廠商負責人、代理或授權代表可出席，建議派代表以因應減價與程序疑義。", "topic": "開標出席", "source": "Notion：政府採購法 / 第09講 / 再一次"}, {"id": "GPL09B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "某開標程序只有口頭宣布結果，未記錄廠商名稱、家數、過程要點與結果。依第09講，缺少何者？", "option_a": "完整開標紀錄", "option_b": "國內貨品比率", "option_c": "共同投標協議書", "option_d": "異常低價擔保", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第09講§45要求全程留存紀錄，實務上應記錄名稱、家數、過程要點與結果。", "topic": "開標紀錄", "source": "Notion：政府採購法 / 第09講 / 再一次"}, {"id": "GPL09B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "某底價完全由承辦人憑感覺設定，未有市場調查或估算表。依第09講，主要缺失為何？", "option_a": "底價基礎應可稽核，並參酌市場成本與行情", "option_b": "底價只能隨機抽籤", "option_c": "底價不得參考市場行情", "option_d": "底價應由投標廠商自行核定", "correct": "A", "points": 1, "required": "TRU  "請求說明一定使廠商直接得標", "option_d": "結果說明只能由其他廠商提出", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第09講§60整理廠商對減價、比價結果或底價有疑義，得於法定或文件約定期間內請求說明；逾期視為自我限制。", "topic": "結果說明", "source": "Notion：政府採購法 / 第09講 / 再一次"}];
let current = 0;
let answers = Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const key = 'option_' + letter.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}

function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}

function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}

function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}

function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}

function prevQ() {
  if (current > 0) current--;
  render();
}

function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}

function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}

render();
</script>
