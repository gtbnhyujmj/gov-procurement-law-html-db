const questions = [{"id": "GPL04B-L1-01", "level": "Level 1", "type": "multiple_choice", "question": "某案同時含修繕、空調設備與水電，承辦人未分析各項金額比重，直接認定為財物採購。依第04講，主要風險為何？", "option_a": "混合標未依權重正確歸類，可能導致程序適用錯誤", "option_b": "只要有設備就一定是財物採購，沒有風險", "option_c": "採購分類完全不影響後續程序", "option_d": "可以由得標廠商事後決定採購類別", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第04講強調工程、財物、勞務可同時存在時，應依各項金額或比重判定主類別；分類錯誤會導致程序適用錯誤。", "topic": "分類錯誤風險", "source": "Notion：政府採購法 / 第04講 / 不同方向"}, {"id": "GPL04B-L1-02", "level": "Level 1", "type": "multiple_choice", "question": "某案修繕工程占61%，空調設備與水電占39%。依第04講的親子館案例精神，較適合如何認定？", "option_a": "以工程標認定", "option_b": "以勞務標認定", "option_c": "以財產出租認定", "option_d": "以人事任用認定", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第04講案例中修繕工程占比最高約61%，故以工程標認定，空調等設備與水電屬次要。", "topic": "工程標認定", "source": "Notion：政府採購法 / 第04講 / 不同方向"}, {"id": "GPL04B-L1-03", "level": "Level 1", "type": "multiple_choice", "question": "某採購金額150萬元，承辦人認為未達1,000萬元所以不用公告。依第04講，錯誤在哪裡？", "option_a": "公告金額為100萬元以上，達公告金額仍須依法公告招標", "option_b": "所有採購都必須達2億元才需公告", "option_c": "公告金額與查核金額完全相同", "option_d": "150萬元一定屬小額採購", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第04講整理公告金額為100萬元以上，須公告招標；查核金額是另一個門檻，不可混淆。", "topic": "門檻誤判", "source": "Notion：政府採購法 / 第04講 / 不同方向"}, {"id": "GPL04B-L1-04", "level": "Level 1", "type": "multiple_choice", "question": "某勞務採購預算約1,180萬元。依第04講台電案例，最應注意何事？", "option_a": "已達本講示意之查核金額，應注意主管機關查核範圍與程序", "option_b": "一定屬小額採購", "option_c": "只要是勞務就永遠不會達查核金額", "option_d": "只要結算可能低於預算，就不用管預算門檻", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第04講以台電勞務採購預算約1,180萬元為例，說明預算逾查核金額，結算則依實作量核算。", "topic": "查核金額", "source": "Notion：政府採購法 / 第04講 / 不同方向"}, {"id": "GPL04B-L1-05", "level": "Level 1", "type": "multiple_choice", "question": "某公告金額以上工程案，承辦人不公告，只私下找熟識廠商投標。依第04講公開招標精神，主要問題為何？", "option_a": "公開招標應讓任何廠商均可投標，私下找特定廠商違背公開競爭精神", "option_b": "公開招標本來就是只找熟識廠商", "option_c": "公告金額以上一律不得公告", "option_d": "採購法只保護承辦人方便", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第04講整理公開招標為任何廠商均可投標；達公告金額以上依法公告。", "topic": "公開招標", "source": "Notion：政府採購法 / 第04講 / 不同方向"}, {"id": "GPL04B-L1-06", "level": "Level 1", "type": "multiple_choice", "question": "某工程因開幕壓力極大，承辦人說：『先封板，查驗照片以後再補。』依第04講，最主要風險是什麼？", "option_a": "未落實查驗即封板或隱蔽，可能導致驗收受阻、返工增加成本與工期", "option_b": "這是如期如質的標準作法", "option_c": "只要趕上開幕，品質紀錄可全部省略", "option_d": "封板後就不需要驗收", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第04講將趕工犧牲品質列為常見風險，特別提醒未落實查驗即封板或隱蔽會使驗收受阻並增加返工成本。", "topic": "趕工風險", "source": "Notion：政府採購法 / 第04講 / 不同方向"}, {"id": "GPL04B-L1-07", "level": "Level 1", "type": "multiple_choice", "question": "某工程工期很短，但仍要求材料送驗、停留點照片、缺失改善紀錄。依第04講，這反映何種精神？", "option_a": "如期也要如質，工期壓縮與品質維持需同步", "option_b": "品質文件越多越違法", "option_c": "趕工時可完全排除職安衛", "option_d": "工程只要便宜即可", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第04講強調如期、如質，工期壓縮與品質維持需同步，品質管理、材料查驗與紀錄不可省略。", "topic": "如期如質", "source": "Notion：政府採購法 / 第04講 / 不同方向"}, {"id": "GPL04B-L1-08", "level": "Level 1", "type": "multiple_choice", "question": "某場館1至3樓需先開放，4樓暫作儲放區。依第04講，較完整的做法為何？", "option_a": "依契約與監造同意辦理分段啟用與工區劃分，並留存紀錄", "option_b": "使用單位想開就開，不需任何紀錄", "option_c": "分段啟用一定違法", "option_d": "只要口頭同意即可，不需契約或監造意見", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第04講親子館案例提到1–3樓優先開放、4樓管制作儲放區，配合時程辦理分段使用，需依契約及監造同意並留存紀錄。", "topic": "分段啟用", "source": "Notion：政府採購法 / 第04講 / 不同方向"}, {"id": "GPL04B-L1-09", "level": "Level 1", "type": "multiple_choice", "question": "空調設備進場時，承包商只說『這台一定合格』，未提供規格書、檢測或能效資料。依第04講，缺少什麼？", "option_a": "材料設備進場前應檢附出廠證明、規格書、檢測報告或能效標示等文件", "option_b": "只缺少廠商廣告海報", "option_c": "完全沒有缺少，口頭保證即可", "option_d": "缺少的是承辦人私人同意書", "correct": "A", "points": 1, "required": "TRUE", "explanation": "第04講列明材料設備進場前應檢附出廠證明、規格書、耐燃等級、SGS或等同檢測、能效標示等。", "topic": "材料文件", "source": "Notion：政府採購法 / 第04講 / 不同方向"}, {"id": "GPL04B-L1-10", "level": "Level 1", "type": "multiple_choice", "question": "某機關認為品質保證完全是廠商的事，機關不用管理。依第04講，何者正確？", "option_a": "機關與廠商均負品質保證義務", "option_b": "只有 let current = 0;
let answers = Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('progress').textContent = `第 ${current + 1} / ${questions.length} 題｜考點：${q.topic}`;
  document.getElementById('question').textContent = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const key = 'option_' + letter.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${letter}. ${q[key]}`;
    btn.onclick = () => choose(letter);
    if (answers[current]) {
      if (letter === q.correct) btn.classList.add('correct');
      else if (letter === answers[current]) btn.classList.add('wrong');
    }
    optBox.appendChild(btn);
  });
  if (answers[current]) showFeedback();
  else {
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('feedback').textContent = '';
  }
  updateScore();
}

function choose(letter) {
  if (!answers[current]) answers[current] = letter;
  render();
}

function showFeedback() {
  const q = questions[current];
  const selected = answers[current];
  const ok = selected === q.correct;
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.textContent = `${ok ? '答對' : '答錯'}。正解：${q.correct}。${q.explanation}`;
}

function updateScore() {
  const done = answers.filter(Boolean).length;
  const correct = answers.reduce((s, a, i) => s + (a === questions[i].correct ? 1 : 0), 0);
  document.getElementById('score').textContent = `目前作答：${done} / ${questions.length}；答對：${correct} 題`;
}

function nextQ() {
  if (current < questions.length - 1) current++;
  render();
}

function prevQ() {
  if (current > 0) current--;
  render();
}

function restart() {
  answers = Array(questions.length).fill(null);
  current = 0;
  document.getElementById('answerList').style.display = 'none';
  render();
}

function showAnswers() {
  const box = document.getElementById('answerList');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  box.innerHTML = '<h2>答案表</h2>' + questions.map((q, i) =>
    `<p><strong>${i + 1}. ${q.correct}</strong>｜${q.topic}｜${q.explanation}</p>`
  ).join('');
}

render();
</script>
